<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<title>情绪拟人短视频</title>
<style>
:root {
  color-scheme: dark;
  --bg: #000000;
  --surface: rgba(28,28,30,0.82);
  --surface-solid: #1c1c1e;
  --elevated: #2c2c2e;
  --border: rgba(255,255,255,0.1);
  --text: #ffffff;
  --text-secondary: rgba(255,255,255,0.6);
  --text-tertiary: rgba(255,255,255,0.3);
  --primary: #0a84ff;
  --success: #30d158;
  --warning: #ff9f0a;
  --danger: #ff453a;
  --ink: #19191c;
  --mint: #38d5a3;
  --coral: #ff6b6b;
  --sun: #ffd166;
  --sky: #6ec8ff;
  --violet: #b89cff;
}
* { box-sizing: border-box; }
html, body {
  width: 100%; height: 100%; margin: 0;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
}
button, input, select, textarea { font: inherit; }
button { border: 0; color: inherit; background: none; }

.app {
  min-height: 100dvh;
  display: grid;
  grid-template-rows: minmax(0, 1fr) var(--sheet-h, 30vh);
  background: var(--bg);
  transition: grid-template-rows 0.3s cubic-bezier(0.32, 0.72, 0, 1);
}

/* iOS Navigation Bar */
.nav-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding-top: env(safe-area-inset-top);
  height: calc(44px + env(safe-area-inset-top));
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 0.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
}
.nav-content {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 16px;
}
.brand {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 800;
  font-size: 17px;
  letter-spacing: -0.01em;
}
.brand-mark {
  width: 24px; height: 24px;
  border-radius: 7px;
  background:
    radial-gradient(circle at 38% 36%, #fff 0 13%, transparent 14%),
    radial-gradient(circle at 64% 36%, #fff 0 13%, transparent 14%),
    linear-gradient(135deg, var(--sun), var(--coral) 48%, var(--mint));
  box-shadow: inset 0 -8px 10px rgba(0,0,0,0.16);
}
.status-pill {
  max-width: 180px;
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Stage */
.stage-wrap {
  min-height: 0;
  display: grid;
  place-items: center;
  padding: calc(max(62px, env(safe-area-inset-top) + 44px)) 16px calc(12px + env(safe-area-inset-bottom));
}
.stage {
  position: relative;
  width: min(100vw - 32px, calc((100dvh - var(--sheet-h, 30vh) - 90px) * 9 / 16), 400px);
  aspect-ratio: 9 / 16;
  max-height: calc(100dvh - var(--sheet-h, 30vh) - 80px);
  overflow: hidden;
  border-radius: 20px;
  background:
    linear-gradient(135deg, rgba(255,255,255,0.06), transparent),
    #1c1c1e;
  box-shadow:
    0 24px 60px rgba(0,0,0,0.45),
    0 0 0 1px rgba(255,255,255,0.08);
  touch-action: none;
  transition: width 0.3s cubic-bezier(0.32, 0.72, 0, 1), max-height 0.3s cubic-bezier(0.32, 0.72, 0, 1);
}
canvas { display: block; width: 100%; height: 100%; }

.empty-state {
  position: absolute; inset: 0;
  display: grid; place-items: center;
  padding: 26px; text-align: center;
  color: rgba(255,255,255,0.78);
  pointer-events: none;
}
.empty-state.hidden { display: none; }
.empty-card { display: grid; gap: 14px; justify-items: center; }
.empty-face {
  width: 88px; height: 88px;
  border-radius: 50%;
  background: linear-gradient(145deg, #ffd166, #ff8a5b);
  position: relative;
  box-shadow: 0 14px 28px rgba(0,0,0,0.25);
}
.empty-face::before, .empty-face::after {
  content: ""; position: absolute; top: 30px;
  width: 16px; height: 20px; border-radius: 50%; background: #16161a;
}
.empty-face::before { left: 26px; }
.empty-face::after { right: 26px; }
.empty-mouth {
  position: absolute; left: 29px; bottom: 24px;
  width: 30px; height: 14px;
  border: 4px solid #16161a; border-top: 0;
  border-radius: 0 0 30px 30px;
}
.empty-title { font-size: 17px; font-weight: 800; }
.empty-sub {
  max-width: 260px;
  color: rgba(255,255,255,0.55);
  font-size: 13px; line-height: 1.6;
}

/* Floating Action Buttons */
/* Sheet Toolbar — action buttons inside control sheet */
.sheet-toolbar {
  display: flex;
  gap: 10px;
  padding: 10px 16px 6px;
  flex-shrink: 0;
}
.sheet-toolbar .action-btn {
  flex: 1;
  min-height: 46px;
  border-radius: 14px;
  font-size: 15px;
  font-weight: 700;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  cursor: pointer;
  transition: transform 0.15s ease, opacity 0.15s ease;
  border: none;
}
.sheet-toolbar .action-btn:active { transform: scale(0.96); }
.action-import {
  background: linear-gradient(135deg, #ff6b6b, #ffd166);
  color: #17130f;
}
.action-export {
  background: linear-gradient(135deg, #38d5a3, #6ec8ff);
  color: #06120f;
}
.sheet-toolbar .action-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

/* Bottom Sheet Control Panel */
.control-sheet {
  display: flex;
  flex-direction: column;
  gap: 0;
  background: var(--surface);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border-top: 0.5px solid var(--border);
  border-radius: 24px 24px 0 0;
  padding: 0 0 calc(env(safe-area-inset-bottom));
  height: 100%;
  overflow: hidden;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.2) transparent;
  -webkit-overflow-scrolling: touch;
}

.sheet-handle-wrap {
  padding: 10px 0 2px;
  cursor: ns-resize;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}
.sheet-handle {
  width: 36px; height: 5px;
  border-radius: 999px;
  background: rgba(255,255,255,0.25);
  transition: background 0.2s ease, width 0.2s ease;
}
.sheet-handle-wrap:active .sheet-handle {
  background: rgba(255,255,255,0.45);
  width: 44px;
}
.sheet-expand-hint {
  font-size: 11px;
  color: rgba(255,255,255,0.3);
  font-weight: 600;
}

/* Tabs */
.sheet-tabs {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 8px 16px 4px;
  scrollbar-width: none;
  flex-shrink: 0;
}
.sheet-tabs::-webkit-scrollbar { display: none; }
.sheet-tab {
  flex-shrink: 0;
  padding: 7px 16px;
  border-radius: 8px;
  background: var(--elevated);
  border: none;
  color: var(--text-secondary);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
}
.sheet-tab.active {
  background: var(--primary);
  color: #fff;
}

/* Sheet Panels */
.sheet-panels {
  position: relative;
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.2) transparent;
  -webkit-overflow-scrolling: touch;
}
.sheet-panels::-webkit-scrollbar { width: 6px; }
.sheet-panels::-webkit-scrollbar-track { background: transparent; }
.sheet-panels::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 999px; }
.sheet-panel {
  display: none;
  padding: 12px 16px 20px;
  gap: 10px;
  flex-direction: column;
  animation: fadeIn 0.25s ease;
}
.sheet-panel.active { display: flex; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Panel Title */
.panel-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  font-size: 13px;
  font-weight: 800;
  color: rgba(255,255,255,0.7);
  margin-bottom: 2px;
}
.panel-actions { display: flex; align-items: center; gap: 8px; }
.panel-subtitle {
  color: var(--text-secondary);
  font-size: 12px;
  font-weight: 700;
  margin-top: 4px;
}

/* Rows & Chips */
.row {
  display: flex;
  gap: 8px;
  align-items: center;
  min-height: 0;
  flex-shrink: 0;
}
.row.wrap { flex-wrap: wrap; }
.row.scroll {
  overflow-x: auto;
  min-height: 46px;
  padding-bottom: 4px;
  scrollbar-width: none;
}
.row.scroll::-webkit-scrollbar { display: none; }

.btn, .chip, .icon-btn {
  min-height: 42px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1);
  background: var(--elevated);
  color: var(--text);
  cursor: pointer;
  transition: transform 0.15s ease, background 0.15s ease;
}
.btn:active, .chip:active, .icon-btn:active { transform: scale(0.96); }

.btn {
  flex: 1;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 0 14px;
  font-weight: 700;
  font-size: 14px;
}
.btn.good {
  background: linear-gradient(135deg, #38d5a3, #2eb398);
  color: #fff;
  border-color: transparent;
}
.btn.danger {
  background: linear-gradient(135deg, #ff453a, #ff6b6b);
  color: #fff;
  border-color: transparent;
}
.btn:disabled { opacity: 0.35; cursor: not-allowed; }

.chip {
  flex: 0 0 auto;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  padding: 0 14px;
  font-size: 13px;
  font-weight: 700;
  white-space: nowrap;
}
.chip.active {
  background: var(--primary);
  color: #fff;
  border-color: transparent;
}

.swatch {
  width: 12px; height: 12px;
  border-radius: 4px;
  background: var(--swatch);
  box-shadow: inset 0 0 0 1px rgba(0,0,0,0.16);
}

.icon-btn {
  flex: 0 0 44px;
  display: grid;
  place-items: center;
  font-size: 18px;
}

.subject-chip {
  position: relative;
  min-width: 84px;
  padding: 0 14px;
  justify-content: space-between;
}
.subject-chip .badge {
  min-width: 20px; height: 20px;
  border-radius: 999px;
  display: inline-grid;
  place-items: center;
  background: rgba(255,255,255,0.14);
  font-size: 11px;
}
.subject-chip.active .badge { background: rgba(0,0,0,0.12); }

/* Emotion Grid */
.emotion-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.emotion-grid .chip {
  flex-direction: column;
  padding: 10px 4px;
  min-height: 64px;
  gap: 4px;
  border-radius: 12px;
}
.emotion-grid .swatch {
  width: 22px; height: 22px;
  border-radius: 50%;
}

/* Field & Inputs */
.field {
  flex: 1;
  min-height: 76px;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  background: var(--elevated);
  color: var(--text);
  padding: 10px 12px;
  resize: none;
  outline: none;
  font-size: 15px;
}
.field:focus {
  border-color: var(--primary);
  background: rgba(255,255,255,0.08);
}

.api-key-field {
  min-height: 42px;
  font-size: 13px;
  font-family: "SF Mono", "Menlo", monospace;
  letter-spacing: 0.02em;
}
.api-model-select {
  min-height: 42px;
  font-size: 13px;
  cursor: pointer;
}
.api-model-select option { background: #1c1c1e; color: #fff; }
.ai-btn {
  background: linear-gradient(135deg, #b89cff, #6ec8ff);
  color: #17130f;
  font-weight: 800;
  position: relative;
}
.ai-btn.loading {
  pointer-events: none;
  opacity: 0.6;
}
.ai-btn.loading::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 10px;
  border: 2px solid transparent;
  border-top-color: #17130f;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* iOS Toggle Switch */
.ios-toggle, .ios-list-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 12px 0;
  cursor: pointer;
}
.ios-toggle input, .ios-list-item input[type="checkbox"] {
  display: none;
}
.toggle-track {
  width: 50px; height: 30px;
  border-radius: 999px;
  background: rgba(255,255,255,0.2);
  position: relative;
  transition: background 0.25s ease;
  flex-shrink: 0;
}
.toggle-knob {
  position: absolute;
  top: 2px; left: 2px;
  width: 26px; height: 26px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 2px 6px rgba(0,0,0,0.25);
  transition: transform 0.25s cubic-bezier(0.32,0.72,0,1);
}
.ios-toggle input:checked + .toggle-track,
.ios-list-item input:checked + .toggle-track {
  background: var(--primary);
}
.ios-toggle input:checked + .toggle-track .toggle-knob,
.ios-list-item input:checked + .toggle-track .toggle-knob {
  transform: translateX(20px);
}
.toggle-label {
  font-size: 15px;
  color: var(--text);
}
.ios-list-item > span:first-child {
  font-size: 15px;
  color: var(--text);
  flex: 1;
}

/* iOS Slider Group */
.ios-slider-group {
  display: grid;
  gap: 16px;
  padding: 8px 0;
}
.ios-slider-row {
  display: flex;
  align-items: center;
  gap: 12px;
}
.ios-slider-label {
  width: 72px;
  flex-shrink: 0;
  font-size: 14px;
  color: var(--text-secondary);
  font-weight: 600;
}
input[type="range"] {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 4px;
  border-radius: 999px;
  background: rgba(255,255,255,0.15);
  outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  cursor: pointer;
}
input[type="range"]::-moz-range-thumb {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: #fff;
  border: none;
  box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  cursor: pointer;
}

/* Line Emotion Panel */
.line-emotion-panel { display: grid; gap: 8px; }
.line-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 120px;
  gap: 8px;
  align-items: center;
  padding: 8px 0;
  border-bottom: 0.5px solid rgba(255,255,255,0.06);
}
.line-meta { min-width: 0; display: grid; gap: 3px; }
.line-index {
  color: var(--text-tertiary);
  font-size: 11px;
  font-weight: 800;
}
.line-preview {
  min-width: 0;
  color: rgba(255,255,255,0.82);
  font-size: 12px;
  line-height: 1.35;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.line-select {
  width: 100%;
  min-height: 36px;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  background: var(--elevated);
  color: var(--text);
  padding: 0 10px;
  outline: none;
  font-size: 13px;
}
.line-select option { background: #fff; color: #171717; }

/* Toast */
.toast {
  position: fixed;
  left: 50%;
  bottom: calc(60px + env(safe-area-inset-bottom));
  z-index: 120;
  transform: translateX(-50%) translateY(12px);
  max-width: min(88vw, 380px);
  padding: 12px 16px;
  border-radius: 12px;
  background: rgba(60,60,65,0.92);
  border: 0.5px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.92);
  font-size: 14px;
  line-height: 1.4;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease, transform 0.25s ease;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Utility */
#fileInput { display: none; }
#sourceVideo { display: none; }
.panel-resizer { display: none !important; }

/* Desktop fallback - keep centered mobile look */
@media (min-width: 820px) {
  .app {
    max-width: 414px;
    margin: 0 auto;
    position: relative;
    box-shadow: 0 0 60px rgba(0,0,0,0.6);
  }
  body { background: #0a0a0c; }
}

/* Live mode chat bar & indicators */
#liveChatBar {
  animation: liveSlideUp 0.25s ease;
}
@keyframes liveSlideUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
#liveSendBtn.loading {
  pointer-events: none;
  opacity: 0.5;
  font-size:0;
}
#liveSendBtn.loading::after {
  content: "";
  width: 14px; height: 14px;
  border: 2px solid transparent;
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  position: absolute;
}
#liveIndicator {
  animation: livePulse 2s ease-in-out infinite;
}
@keyframes livePulse {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0.6; }
}
#listeningIndicator {
  animation: listenBreath 1.2s ease-in-out infinite;
}
@keyframes listenBreath {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%      { opacity: 0.7; transform: scale(1.08); }
}
#liveChatInput::placeholder {
  color: rgba(255,255,255,0.35);
}
/* 语音按钮状态 */
#liveMicBtn:active,
#liveMicBtn.listening {
  transform: scale(1.12);
  box-shadow: 0 4px 32px rgba(255,59,48,0.55);
  border-color: rgba(255,59,48,0.6);
  background: #ff453a;
}
#liveMicBtn.listening::after {
  content: "";
  position: absolute;
  inset: -8px;
  border-radius: 50%;
  border: 2px solid rgba(255,59,48,0.35);
  animation: micRing 1s ease-out infinite;
}
@keyframes micRing {
  0%   { inset: -8px; opacity: 1; }
  100% { inset: -24px; opacity: 0; }
}
#liveMicBtn.loading {
  pointer-events: none;
  background: rgba(255,255,255,0.2);
  border-color: transparent;
  box-shadow: none;
  font-size: 0;
}
#liveRecordBtn.recording {
  background: #ff453a;
  color: #fff;
  animation: recPulse 0.8s ease-in-out infinite;
}
@keyframes recPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255,59,48,0.5); }
  50%      { box-shadow: 0 0 0 8px rgba(255,59,48,0); }
}
#recordingTimer {
  animation: recBlink 1s step-end infinite;
}
@keyframes recBlink {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0.4; }
}
#liveMicBtn.loading::before {
  content: "";
  width: 20px; height: 20px;
  border: 2.5px solid transparent;
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  position: absolute;
  inset: 0;
  margin: auto;
}
</style>
</head>
<body>
<main class="app">
  <div class="nav-bar">
    <div class="nav-content">
      <div class="brand"><span class="brand-mark" aria-hidden="true"></span><span>情绪拟人</span></div>
      <div class="status-pill" id="statusText">导入素材开始创作</div>
    </div>
  </div>

  <section class="stage-wrap" aria-label="预览区">
    <div class="stage" id="stage">
      <canvas id="canvas" width="720" height="1280"></canvas>
      <div id="liveIndicator" style="display:none;position:absolute;top:8px;left:8px;z-index:10;background:rgba(255,59,48,0.82);color:#fff;font-size:10px;font-weight:700;padding:4px 8px;border-radius:999px;letter-spacing:0.04em;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)">● LIVE</div>
      <button id="flipCameraBtn" style="display:none;position:absolute;top:8px;right:8px;z-index:10;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,0.5);border:0.5px solid rgba(255,255,255,0.2);color:#fff;font-size:18px;cursor:pointer;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)" title="翻转摄像头">↻</button>

  function resolveEmotionKey(name) {
    if (!name) return null;
    const text = String(name).trim();
    if (!text) return null;
    // 直接是英文 key（如 "scared"）
    if (emotions[text]) return text;
    // 中文名精确匹配
    if (EMOTION_NAME_MAP[text]) return EMOTION_NAME_MAP[text];
    // 包含关系：取最先匹配到的最长 key
    for (const key of EMOTION_NAME_KEYS_SORTED) {
      if (text.includes(key)) return EMOTION_NAME_MAP[key];
    }
    return null;
  }

  function parseDeepSeekContent(content) {
    if (!content) return null;
    // 尝试提取 JSON（去除可能的 ```json 包裹）
    let text = content.trim();
    const codeBlock = text.match(/```(?:json)?\s*([\s\S]+?)\s*```/);
    if (codeBlock) text = codeBlock[1].trim();
    // 找到第一个 { 到最后一个 }
    const start = text.indexOf("{");
    const end = text.lastIndexOf("}");
    if (start < 0 || end < 0) return null;
    const json = text.slice(start, end + 1);
    try {
      const parsed = JSON.parse(json);
      if (!Array.isArray(parsed.lines)) return null;
      // 提取 persona（可空）和 speechRate（0.5-2.0）
      const persona = typeof parsed.persona === "string" ? parsed.persona.trim() : "";
      const speechRate = clampSpeechRate(parsed.speechRate);
      const cleaned = parsed.lines
        .map(item => {
          if (!item || typeof item !== "object") return null;
          const text = String(item.text || "").trim();
          if (!text) return null;
          const emotionCn = String(item.emotion || "").trim();
          const emotionKey = resolveEmotionKey(emotionCn);
          return { text, emotionKey, emotionCn };
        })
        .filter(Boolean)
        .slice(0, 8);
      if (!cleaned.length) return null;
      return { persona, speechRate, lines: cleaned };
    } catch (err) {
      console.warn("DeepSeek JSON parse failed:", err);
      return null;
    }
  }

  function clampSpeechRate(value) {
    const n = Number(value);
    if (!Number.isFinite(n)) return 1.0;
    return Math.max(0.5, Math.min(2.0, n));
  }

        "Content-Type": "application/json",
        "Authorization": `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model,
        messages: [
          { role: "system", content: "你是一个严谨的 JSON 生成器，严格按用户要求的 JSON 格式返回，不要任何额外文字。" },
          { role: "user", content: prompt }
        ],
        temperature: 1.0,
        max_tokens: 800,
        stream: false
      })
    });
    if (!res.ok) {
      const errText = await res.text().catch(() => "");
      throw new Error(`DeepSeek 请求失败 ${res.status}: ${errText.slice(0, 200)}`);
    }
    const data = await res.json();
    const content = data?.choices?.[0]?.message?.content;
    if (!content) throw new Error("DeepSeek 返回内容为空");
    return content;
  }

  async function generateDialogueWithAI(subject) {
    const { apiKey, model } = getDeepSeekConfig();
    if (!apiKey) {
      showToast("请先在下方填写 DeepSeek API Key");
      apiKeyInput.focus();
      return;
    }
    const topic = (subject.topic || "").trim();
    if (!topic) {
      showToast("请先输入一个话题");
      topicInput.focus();
      return;
    }
    const persona = (subject.persona || "").trim();
    const prompt = buildDeepSeekPrompt(persona, topic);
    aiGenBtn.classList.add("loading");
    aiGenBtn.disabled = true;
    try {
      const content = await callDeepSeek(apiKey, model, prompt);
      const parsed = parseDeepSeekContent(content);
      if (!parsed) {
        showToast("AI 返回格式无法解析，请重试");
        return;
      }
      const lines = parsed.lines;
      // 若用户没填人格，用 AI 生成的填充
      if (!persona && parsed.persona) {
        subject.persona = parsed.persona;
      }
      // 用 AI 生成的语速
      if (parsed.speechRate && Number.isFinite(parsed.speechRate)) {
        subject.speechRate = parsed.speechRate;
      }
      const texts = lines.map(l => l.text);
      const emotions = lines.map(l => l.emotionKey || subject.emotion || "happy");
      subject.dialogueText = texts.join("\n");
      subject.dialogueLines = texts;
      subject.lineEmotions = emotions;
      resetDialogueVoiceState(subject);
      subject.dialogueStartedAt = performance.now();
      captionInput.value = subject.dialogueText;
      buildLineEmotionPanel();
      const matched = lines.filter(l => l.emotionKey).length;
      const unmatchedSamples = lines
        .filter(l => !l.emotionKey)
        .map(l => l.emotionCn)
        .filter(Boolean)
        .slice(0, 3);
      const unmatchedHint = unmatchedSamples.length
        ? `，未识别情绪：${unmatchedSamples.join("、")}`
        : "";
      const speechHint = parsed.speechRate
        ? `，语速 ${parsed.speechRate.toFixed(2)}×`
        : "";
      const personaHint = !persona && parsed.persona
        ? "（已自动填写人格）"
        : "";
      showToast(`AI 生成 ${texts.length} 句（情绪匹配 ${matched}/${texts.length}）${unmatchedHint}${speechHint}${personaHint}`);
    } catch (err) {
      console.error(err);
      showToast(err.message || "AI 生成失败，请检查网络和 API Key");
    } finally {
      aiGenBtn.classList.remove("loading");
      aiGenBtn.disabled = false;
      refreshControls();
    }
  }

  async function ensureAudio(showError = false) {

        audioMaster = audioCtx.createGain();
        audioMaster.gain.value = 0.82;

        audioDestination = audioCtx.createMediaStreamDestination();
        audioMaster.connect(audioCtx.destination);
        audioMaster.connect(audioExportGain);
        audioExportGain.connect(audioDestination);
      }
      if (audioCtx.state === "suspended") {
        await audioCtx.resume();
      }
      audioAvailable = audioCtx.state === "running" && Boolean(audioDestination?.stream?.getAudioTracks().length);
      return audioAvailable;

  function voiceParam(value, time, next) {
    if (!value) return;
    value.cancelScheduledValues(time);
    value.setValueAtTime(value.value, time);
    value.linearRampToValueAtTime(next, time + 0.012);
  }

  function scheduleVoiceSyllable(voice, mod, start, duration, frequency, volume, seed) {
    const carrier = audioCtx.createOscillator();
    const carrierGain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    const tremolo = audioCtx.createOscillator();
    const tremoloGain = audioCtx.createGain();
    const tremoloDepth = audioCtx.createGain();

    carrier.type = voice.wave;
    carrier.frequency.setValueAtTime(frequency, start);
    carrier.frequency.exponentialRampToValueAtTime(Math.max(70, frequency * (1 + voice.chirp + mod.chirp)), start + duration * 0.72);

    filter.type = "bandpass";
    filter.frequency.setValueAtTime(Math.max(220, voice.formant * mod.pitch), start);
    filter.Q.value = 7;

    carrierGain.gain.setValueAtTime(0.0001, start);
    carrierGain.gain.exponentialRampToValueAtTime(Math.max(0.001, volume), start + duration * 0.18);
    carrierGain.gain.exponentialRampToValueAtTime(0.0001, start + duration);

    tremolo.type = "sine";
    tremolo.frequency.value = 10 + mod.jitter * 38 + seed * 2;
    tremoloGain.gain.value = volume * mod.jitter * 0.45;
    tremoloDepth.gain.value = 1;

    tremolo.connect(tremoloGain);
    tremoloGain.connect(carrierGain.gain);
    carrier.connect(filter);
    filter.connect(carrierGain);
    carrierGain.connect(audioMaster);

    carrier.start(start);
    tremolo.start(start);
    carrier.stop(start + duration + 0.03);
    tremolo.stop(start + duration + 0.03);

    if (voice.noise > 0) {
      const bufferSize = Math.max(1, Math.floor(audioCtx.sampleRate * duration));
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
      }
      const noise = audioCtx.createBufferSource();
      const noiseGain = audioCtx.createGain();
      const noiseFilter = audioCtx.createBiquadFilter();
      noise.buffer = buffer;
      noiseFilter.type = "highpass";
      noiseFilter.frequency.value = 900;
      noiseGain.gain.setValueAtTime(volume * voice.noise * mod.gain, start);
      noiseGain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
      noise.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(audioMaster);
      noise.start(start);
      noise.stop(start + duration + 0.02);
    }
  }

  function playGibberish(subject, dialogue, force = false) {
    if (!subject || subject.voiceEnabled === false) return;
    if (!force && subject.lastSpokenLineIndex === dialogue.index) return;
    subject.lastSpokenLineIndex = dialogue.index;
    if (!audioAvailable || !audioCtx || audioCtx.state !== "running") return;

    const voice = VOICE_TYPES[subject.voiceType] || VOICE_TYPES.minion;
    const mod = EMOTION_VOICE_MODS[dialogue.emotion] || EMOTION_VOICE_MODS.happy;
    const text = dialogue.line || "";
    const textWeight = Math.max(3, Math.min(14, Array.from(text).length));
    const syllableCount = Math.max(3, Math.min(12, Math.ceil(textWeight / 2.2)));
    const lineDuration = Math.max(0.55, Math.min(3.2, (Number(dialogue.speed) || Number(subject.lineSpeed) || 3.5) * 0.86));
    const gap = lineDuration / syllableCount;
    const syllableDuration = Math.max(0.045, Math.min(0.16, gap * 0.58 / mod.rate));
    const volume = Math.max(0, Math.min(1, Number(subject.voiceVolume ?? 0.58))) * 0.18 * mod.gain;
    const startAt = audioCtx.currentTime + 0.025;

    for (let i = 0; i < syllableCount; i++) {
      const seed = ((subject.phase || 0) + i * 1.618 + dialogue.index * 0.37) % 1;
      const pattern = voice.syllables[i % voice.syllables.length];
      const emotionJitter = 1 + (Math.sin(i * 2.4 + subject.phase) * mod.jitter);
      const pitchHop = dialogue.emotion === "surprise" ? 1 + i * 0.035 : dialogue.emotion === "sad" ? 1 - i * 0.018 : 1;
      const frequency = Math.max(80, (voice.base + voice.spread * (seed - 0.5)) * pattern * mod.pitch * emotionJitter * pitchHop);
      scheduleVoiceSyllable(voice, mod, startAt + i * gap, syllableDuration, frequency, volume, seed);
    }
  }

  // ===== TTS（Web Speech API 朗读对白）=====

  // 系统中文声音缓存：第一次取，浏览器异步加载完再刷新
  let _allZhVoices = null;
  let _zhVoicesLoaded = false;

  function getAllZhVoices() {
    if (!('speechSynthesis' in window)) return [];
    if (_zhVoicesLoaded && _allZhVoices) return _allZhVoices;
    const all = window.speechSynthesis.getVoices() || [];
    _allZhVoices = all.filter(v => /^zh/i.test(v.lang));
    _zhVoicesLoaded = true;
    return _allZhVoices;
  }

  // 根据音色类型匹配最合适的系统语音
  function getVoiceForType(voiceType) {
    if (!('speechSynthesis' in window)) return null;
    const zhVoices = getAllZhVoices();
    if (!zhVoices.length) return null;

    const name = (v) => (v.name || "").toLowerCase();
    const lang = (v) => (v.lang || "").toLowerCase();

    switch (voiceType) {
      case "child": {
        // 优先找「童声/瑶瑶」类系统声音
        const childVoice = zhVoices.find(v =>
          name(v).includes("yaoyao") || name(v).includes("tongtong") ||
          name(v).includes("mei-jia") || lang(v) === "zh-tw"
        );
        if (childVoice) return childVoice;
        // 没专门童声则返回音高最高的女声（后面再用 pitch 拉高）
        const femaleVoices = zhVoices.filter(v => !name(v).includes("kangkang"));
        if (femaleVoices.length) return femaleVoices[0];
        return zhVoices[0];
      }
      case "villain": {
        // 坏人音：用 zh-CN 女声 + 极低音高制造阴森感（不和男声抢 kangkang）
        const defaultZh = zhVoices.find(v => lang(v) === "zh-cn" || lang(v) === "zh_cn");
        return defaultZh || zhVoices[0];
      }
      case "yujie": {
        // 御姐音：找成熟女声或 zh-CN（偏低音高）
        const mature = zhVoices.find(v =>
          name(v).includes("huihui") || lang(v) === "zh-cn" || lang(v) === "zh_cn"
        );
        return mature || zhVoices[0];
      }
      case "northeast": {
        // 东北话：用 zh-CN 女声 + 低音高 + 快语速（靠 pitch/rate 区分，不抢男声）
        const zhcn = zhVoices.find(v => lang(v) === "zh-cn" || lang(v) === "zh_cn");
        return zhcn || zhVoices[0];
      }
      case "male": {
        // 男声：先在中文语音里找男性标识名
        const zhMale = zhVoices.find(v => {
          const n = name(v);
          return n.includes("kangkang") || n.includes("male") ||
            n.includes("xiaoxiao") || n.includes("yunyang") ||
            n.includes("yunjian") || n.includes("yixi") ||
            n.includes("yunxi") || n.includes("xiaoyi");
        });
        if (zhMale) return zhMale;
        // 再搜所有语音，某些非 zh 语音也支持中文朗读
        const allVoices = window.speechSynthesis.getVoices() || [];
        const anyMale = allVoices.find(v => {
          const n = (v.name || "").toLowerCase();
          return /^zh/i.test(v.lang) && (
            n.includes("kang") || n.includes("male") || n.includes("man") ||
            n.includes("boy") || n.includes("yun") || n.includes("xiaoyi")
          );
        });
        if (anyMale) return anyMale;
        // 没系统男声 → 用 zh-CN 女声 + 极低音高（用户可调音高滑块补偿）
        const zhcn = zhVoices.find(v => /zh-cn/i.test(v.lang));
        return zhcn || zhVoices[0];
      }
      case "mandarin":
      default: {
        // 普通话：标准 zh-CN
        const mandVoice = zhVoices.find(v =>
          lang(v) === "zh-cn" || lang(v) === "zh_cn" || name(v).includes("huihui")
        );
        return mandVoice || zhVoices[0];
      }
    }
  }

  if ('speechSynthesis' in window) {
    window.speechSynthesis.onvoiceschanged = () => {
      _zhVoicesLoaded = false;
      _allZhVoices = null;

  function clampTTSRate(speechRate) {
    return Math.max(0.5, Math.min(2.0, Number(speechRate) || 1.0));
  }

  // 简单 hash，用于生成稳定的伪随机变调
  function hashStr(s) {
    let h = 0;
    for (let i = 0; i < s.length; i++) {
      h = ((h << 5) - h + s.charCodeAt(i)) | 0;
    }
    return Math.abs(h);
  }

  // 按中文标点拆分句子为自然停顿片段，合并过短片段
  function splitForNaturalSpeech(text) {
    if (!text) return [""];
    // 在逗号、分号、句号、感叹、问号、顿号、换行后切开（保留标点）
    const raw = text.split(/(?<=[，；。！？、\n])/);
    const merged = [];
    let buf = "";
    for (const p of raw) {
      buf += p;
      // 累积到 4 字或遇到句末标点/换行就输出一段
      if (buf.length >= 4 || /[。！？\n]/.test(p)) {
        if (buf.trim()) merged.push(buf);
        buf = "";
      }
    }
    if (buf.trim()) merged.push(buf);
    return merged.length ? merged : [text];
  }

  // TTS 链式分段朗读：模拟真人停顿 + 音高微变
  let _ttsChainId = 0;
  let _ttsLineActive = false; // 是否有句子正在朗读中

  function speakSegments(segments, idx, chainId, opts) {
    if (idx >= segments.length) {
      // 整句所有分段读完 → 释放标记，让下一句可以开始
      _ttsLineActive = false;
      if (opts.subject) opts.subject.lastSpokenLineIndex = null;
      return;
    }
    if (chainId !== _ttsChainId) { _ttsLineActive = false; return; }

    const seg = segments[idx].trim();
    if (!seg) {
      speakSegments(segments, idx + 1, chainId, opts);
      return;
    }

    const utter = new SpeechSynthesisUtterance(seg);
    utter.lang = "zh-CN";

    // 语速微变 ±6%，模拟真人节奏
    const rateVar = 0.94 + (hashStr(seg + idx) % 13) / 100;
    utter.rate = clampTTSRate(opts.rate * rateVar);

    // 音高微变 ±10%，不同片段略有起伏
    let pitchVar = 0.90 + (hashStr(seg + idx + "p") % 21) / 100;
    const isLast = idx === segments.length - 1;
    if (isLast && /？$/.test(seg)) pitchVar += 0.08;
    else if (isLast && /！$/.test(seg)) pitchVar += 0.04;
    else if (isLast && /。$/.test(seg)) pitchVar -= 0.06;
    utter.pitch = Math.max(0.1, Math.min(2.0, opts.basePitch * opts.userPitch * opts.emoPitch * pitchVar));

    // 句末语速微调
    if (isLast && /[。！？]$/.test(seg)) {
      utter.rate = clampTTSRate(opts.rate * rateVar * 0.94);
    }

    utter.volume = opts.volume;
    if (opts.voice) utter.voice = opts.voice;

    utter.onend = () => {
      if (chainId !== _ttsChainId) return;
      const pause = 150 + (hashStr(seg + "pause") % 150);
      setTimeout(() => {
        speakSegments(segments, idx + 1, chainId, opts);
      }, pause);
    };

    utter.onerror = () => {
      if (chainId === _ttsChainId) {
        setTimeout(() => speakSegments(segments, idx + 1, chainId, opts), 200);
      }
    };

    window.speechSynthesis.speak(utter);
  }

  function playTTS(subject, dialogue, force = false) {
    if (!('speechSynthesis' in window)) return;
    const text = String(dialogue.line || "").trim();
    if (!text) return;

    // force 模式（试听按钮）取消旧句；正常循环不打断
    if (force) {
      try { window.speechSynthesis.cancel(); } catch {}
      _ttsChainId += 1;
    }
    _ttsLineActive = true;

    const segments = splitForNaturalSpeech(text);
    const voice = getVoiceForType(subject.voiceType);
    const baseRate = VOICE_BASE_RATE_TTS[subject.voiceType] || 1.0;
    const basePitch = VOICE_BASE_PITCH_TTS[subject.voiceType] || 1.0;
    const userPitch = Number(subject.voicePitch) || 1.0;
    const emoPitch = EMOTION_PITCH_TTS[dialogue.emotion] || 1.0;
    const rate = clampTTSRate((subject.speechRate || 1.0) * baseRate);
    const volume = Math.max(0, Math.min(1, Number(subject.voiceVolume ?? 0.58)));

    speakSegments(segments, 0, _ttsChainId, { voice, basePitch, userPitch, emoPitch, rate, volume, subject, dialogue });
  }

  // 统一分发：根据 subject.voiceMode 决定走 TTS 还是 gibberish
  function playSubjectVoice(subject, dialogue, force = false) {
    if (!subject || subject.voiceEnabled === false) return;
    if (!force && subject.lastSpokenLineIndex === dialogue.index) return;
    const wantTTS = subject.voiceMode !== "gibberish" && 'speechSynthesis' in window;
    if (wantTTS) {
      // 上一句 TTS 还在朗读中 → 不打断，等读完自动推进
      if (_ttsLineActive && !force) return;
      subject.lastSpokenLineIndex = dialogue.index;
      playTTS(subject, dialogue, force);
    } else {
      // playGibberish 内部还有 lastSpokenLineIndex 检查，幂等
      playGibberish(subject, dialogue, force);
    }
  }

  async function previewSubjectVoice() {
    const subject = selectedSubject();
    if (!subject) return;
    const ok = await ensureAudio(true);
    if (!ok) return;
    const dialogue = getCurrentDialogueState(subject, performance.now());
    playSubjectVoice(subject, { ...dialogue, index: `preview_${Date.now()}` }, true);
  }

  function selectedSubject() {
    return state.subjects.find(subject => subject.id === state.selectedId) || state.subjects[0] || null;
  }

  // ===== 实时对话模式 =====

  async function startCamera(facingMode = "user") {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      throw new Error("当前浏览器不支持摄像头访问");
    }
    // 同时请求视频+音频（iOS 不允许分别调用 getUserMedia）
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: true,
      video: {
        facingMode,
        width: { ideal: 720 },
        height: { ideal: 1280 }
      }
    });
    state.liveMode.cameraStream = stream;
    state.liveMode.facingMode = facingMode;
    sourceVideo.srcObject = stream;
    sourceVideo.playsInline = true;
    sourceVideo.muted = true; // 静音避免回音，录制时从 stream 直接取音轨
    await sourceVideo.play();
    state.source = sourceVideo;
    state.sourceType = "video";
    if (emptyState) emptyState.classList.add("hidden");
    exportBtn.disabled = false;
    setStatus("摄像头已就绪，双击画面选定对话对象");
  }

  function stopCamera() {
    if (state.liveMode.cameraStream) {
      state.liveMode.cameraStream.getTracks().forEach(t => t.stop());
      state.liveMode.cameraStream = null;
    }
    sourceVideo.srcObject = null;
    sourceVideo.pause();
    state.source = null;
    state.sourceType = "";
  }

  async function flipCamera() {
    const newFacing = state.liveMode.facingMode === "user" ? "environment" : "user";
    stopCamera();
    try {
      await startCamera(newFacing);
    } catch (err) {
      showToast("切换摄像头失败: " + (err.message || "未知错误"));
    }
  }

  // 双击检测 — 替换原有的 beginDrag
  function handleCanvasPointerDown(e) {
    const now = performance.now();
    const point = canvasPointFromEvent(e);
    const dt = now - state.liveMode.lastTapTime;
    const dist = Math.hypot(point.x - state.liveMode.lastTapPoint.x, point.y - state.liveMode.lastTapPoint.y);

    // 实时模式下的双击（400ms + 30px 阈值）
    if (state.liveMode.enabled && dt < 400 && dist < 30) {
      handleLiveDoubleTap(point);
      state.liveMode.lastTapTime = 0;
      e.preventDefault();
      return;
    }

    state.liveMode.lastTapTime = now;
    state.liveMode.lastTapPoint = point;

    // 实时模式下的单击：选主体或新建
    if (state.liveMode.enabled) {
      const subject = subjectAtPoint(point);
      if (subject) {
        selectSubject(subject.id);
        if (!state.liveMode.selectedSubjectId) {
          state.liveMode.selectedSubjectId = subject.id;
          liveChatBar.style.display = "block";
          refreshControls();
        }
      } else {
        // 点击空白区域新建主体并锁定
        const s = addSubject({
          x: clamp(point.x, 60, CANVAS_W - 60),
          y: clamp(point.y, 70, CANVAS_H - 70),
          autoTrack: false
        }, true);
        state.liveMode.selectedSubjectId = s.id;
        liveChatBar.style.display = "block";
        refreshControls();
        showToast("已创建对话对象，可以开始聊天了");
      }
      e.preventDefault();
      return;
    }

    // 非实时模式：沿用原有拖拽逻辑
    beginDrag(e);
  }

  function handleLiveDoubleTap(point) {
    const subject = subjectAtPoint(point);
    if (subject) {
      state.liveMode.selectedSubjectId = subject.id;
      selectSubject(subject.id);
      liveChatBar.style.display = "block";
      refreshControls();
      const name = emotions[subject.emotion]?.label || "角色";
      showToast(`已选定「${name}」进行对话`);
    } else {
      // 双击空白区域也创建
      const s = addSubject({
        x: clamp(point.x, 60, CANVAS_W - 60),
        y: clamp(point.y, 70, CANVAS_H - 70),
        autoTrack: false
      }, true);
      state.liveMode.selectedSubjectId = s.id;
      liveChatBar.style.display = "block";
      refreshControls();
      showToast("已创建对话对象，可以开始聊天了");
    }
  }

  async function enableLiveMode() {
    if (state.liveMode.enabled) return;
    await ensureAudio(true);
    try {
      await startCamera(state.liveMode.facingMode);
    } catch (err) {
      showToast("无法访问摄像头: " + (err.message || "请检查权限"));
      if (liveToggle) liveToggle.checked = false;
      return;
    }
    state.liveMode.enabled = true;
    state.liveMode.messages = [];
    state.liveMode.selectedSubjectId = null;
    state.liveMode.isGenerating = false;

    if (!state.subjects.length) {
      addSubject({ x: CANVAS_W * 0.5, y: CANVAS_H * 0.56, autoTrack: false }, true);
    }
    // 关闭所有主体的自动跟踪
    for (const s of state.subjects) { s.autoTrack = false; }

    liveIndicator.style.display = "block";
    flipCameraBtn.style.display = "block";
    if (liveRecordBtn) liveRecordBtn.style.display = "block";
    liveChatBar.style.display = "none";
    if (liveStatus) liveStatus.textContent = "摄像头已启动，双击画面选择对话对象";
    exportBtn.disabled = true;
    pickBtn.disabled = true;
    if (liveChatLog) liveChatLog.innerHTML = "";

    setSheetHeight(SHEET_LARGE);
    // 切换到 live tab
    sheetTabs.forEach(t => t.classList.toggle("active", t.dataset.tab === "live"));
    sheetPanels.forEach(p => p.classList.toggle("active", p.dataset.panel === "live"));

    refreshControls();
    showToast("实时对话模式已开启");
  }

  function disableLiveMode() {
    if (state.liveMode.isRecording) stopLiveRecording(true);
    stopCamera();
    state.liveMode.enabled = false;
    state.liveMode.selectedSubjectId = null;
    state.liveMode.messages = [];
    state.liveMode.isGenerating = false;
    if (state.liveMode.recognition) {
      try { state.liveMode.recognition.abort(); } catch (e) { /* ignore */ }
    }
    state.liveMode.isListening = false;

    liveIndicator.style.display = "none";
    flipCameraBtn.style.display = "none";
    if (liveRecordBtn) liveRecordBtn.style.display = "none";
    if (recordingTimer) recordingTimer.style.display = "none";
    liveChatBar.style.display = "none";
    listeningIndicator.style.display = "none";
    if (liveStatus) liveStatus.textContent = "";
    if (liveChatLog) liveChatLog.innerHTML = "";

    state.source = null;
    state.sourceType = "";
    if (emptyState) emptyState.classList.remove("hidden");
    exportBtn.disabled = true;
    pickBtn.disabled = false;
    sourceVideo.srcObject = null;
    sourceVideo.pause();

    for (const s of state.subjects) { s.autoTrack = true; }

    refreshControls();
    setStatus("实时对话已关闭");
    showToast("实时对话模式已关闭");
  }

  // ===== 对话 AI =====

  function resolvePersonaDescription(personaKey) {
    if (!personaKey) return "";
    // 如果是内置角色名，返回完整人格描述
    if (PERSONA_PRESETS[personaKey]) return PERSONA_PRESETS[personaKey].desc;
    // 否则直接返回原文本（可能是自定义文本）
    return personaKey;
  }

  function buildConversationPrompt(personaKey, topic, chatHistory) {
    const personaDescText = resolvePersonaDescription(personaKey);
    const emotionOptions = Object.keys(emotions)
      .map(k => emotions[k].label)
      .filter((v, i, arr) => arr.indexOf(v) === i)
      .join("、");

    const historyText = chatHistory.slice(-6).map(m =>
      `${m.role === "user" ? "用户" : "角色"}: ${m.content}`
    ).join("\n");

    return `你是一个短视频角色的实时对话引擎。你正在扮演一个角色和用户面对面聊天。

【角色人格设定】
${personaDescText || "一个活泼可爱的小角色"}

【当前话题焦点】
${topic || "自由聊天"}

【最近对话历史】
${historyText || "（对话刚刚开始）"}

【用户刚才说的话】
{{USER_MESSAGE}}

【要求】
1. 用角色的口吻生成 1-3 句回复，每句 4-25 字
2. 回复要自然、口语化、有角色感
3. 给每句回复匹配一个情绪，必须是以下选项：${emotionOptions}
4. 总字数控制在 8-60 字
5. 可以适当追问或反问，让对话自然延续
6. 严格只返回 JSON，不要任何解释或代码块标记

返回格式：
{"persona":"10-25字角色性格侧写","speechRate":1.0,"lines":[{"text":"回复句子","emotion":"情绪中文名"}]}`;
  }

  async function sendLiveChatMessage(userMessage) {
    const sid = state.liveMode.selectedSubjectId;
    if (!sid || state.liveMode.isGenerating) return;
    const subject = state.subjects.find(s => s.id === sid);
    if (!subject) return;

    cleanupIOSDictation(); // 防止 iOS dictation 自动发送重复触发
    state.liveMode.isGenerating = true;
    if (liveMicBtn) { liveMicBtn.classList.add("loading"); liveMicHint.textContent = "思考中…"; }
    if (liveSendBtn) { liveSendBtn.disabled = true; liveSendBtn.classList.add("loading"); }
    if (liveChatInput) liveChatInput.disabled = true;

    state.liveMode.messages.push({ role: "user", content: userMessage, timestamp: Date.now() });
    updateLiveChatLog();

    try {
      const { apiKey, model } = getDeepSeekConfig();
      if (!apiKey) {
        showToast("请先在文字面板填写 DeepSeek API Key");
        resetLiveInput();
        return;
      }
      const personaKey = subject.persona || "盛明兰";
      const topic = (subject.topic || (liveTopicInput ? liveTopicInput.value : "") || "").trim();
      const prompt = buildConversationPrompt(personaKey, topic, state.liveMode.messages)
        .replace("{{USER_MESSAGE}}", userMessage);

      const content = await callDeepSeek(apiKey, model, prompt);
      const parsed = parseDeepSeekContent(content);

      if (!parsed || !parsed.lines || !parsed.lines.length) {
        // Fallback
        const fb = {
          persona: (PERSONA_PRESETS[personaKey] || {}).desc || "一个友善的小助手",
          speechRate: 1.0,
          lines: [{ text: "嗯…这个我得想想再回你～", emotion: "疑惑" }]
        };
        applyConversationResponse(subject, fb);
        state.liveMode.messages.push({ role: "assistant", content: fb.lines.map(l => l.text).join(""), timestamp: Date.now() });
      } else {
        applyConversationResponse(subject, parsed);
        state.liveMode.messages.push({ role: "assistant", content: parsed.lines.map(l => l.text).join(""), timestamp: Date.now() });
      }
      updateLiveChatLog();
    } catch (err) {
      console.error("Live chat AI error:", err);
      showToast("AI 回复失败: " + (err.message || "请检查网络"));
    } finally {
      resetLiveInput();
    }
  }

  function applyConversationResponse(subject, parsed) {
    const texts = parsed.lines.map(l => l.text);
    const emotionsList = parsed.lines.map(l => l.emotionKey || subject.emotion || "happy");
    subject.dialogueText = texts.join("\n");
    subject.dialogueLines = texts;
    subject.lineEmotions = emotionsList;
    resetDialogueVoiceState(subject);
    subject.dialogueStartedAt = performance.now();
    if (parsed.speechRate && Number.isFinite(Number(parsed.speechRate))) {
      subject.speechRate = Number(parsed.speechRate);
    }
    if (parsed.persona && !subject.persona) {
      subject.persona = parsed.persona;
    }
  }

  function resetLiveInput() {
    state.liveMode.isGenerating = false;
    _isHoldingMic = false;
    cleanupIOSDictation();
    if (liveMicBtn) { liveMicBtn.classList.remove("loading", "listening"); liveMicHint.textContent = "按住 说话"; }
    if (liveChatInput) { liveChatInput.value = ""; liveChatInput.disabled = false; }
    if (liveSendBtn) { liveSendBtn.disabled = false; liveSendBtn.classList.remove("loading"); }
  }

  function updateLiveChatLog() {
    if (!liveChatLog) return;
    const recent = state.liveMode.messages.slice(-10);
    liveChatLog.innerHTML = recent.map(m => {
      const who = m.role === "user" ? "👤 你" : "🤖 角色";
      return `<div style="margin-bottom:3px"><b>${who}:</b> ${escapeHtml(m.content)}</div>`;
    }).join("");
    liveChatLog.scrollTop = liveChatLog.scrollHeight;
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  // ===== 语音识别（渐进增强，iOS 不可用时回退键盘 dictation）=====

  function initSpeechRecognition() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return false;
    const rec = new SR();
    rec.lang = "zh-CN";
    rec.continuous = false;
    rec.interimResults = false;
    rec.onresult = (e) => {
      const text = (e.results[0][0].transcript || "").trim();
      state.liveMode.isListening = false;
      listeningIndicator.style.display = "none";
      liveMicBtn.classList.remove("listening");
      if (text) {
        if (liveChatInput) liveChatInput.value = text;
        liveMicHint.textContent = "识别成功，发送中…";
        sendLiveChatMessage(text);
      } else {
        liveMicHint.textContent = "没听清，再试一次";
      }
    };
    rec.onerror = (e) => {
      state.liveMode.isListening = false;
      listeningIndicator.style.display = "none";
      liveMicBtn.classList.remove("listening");
      if (e.error !== "aborted" && e.error !== "no-speech") {
        showToast("语音识别不可用，点 ⌨ 切换文字输入");
      }
      liveMicHint.textContent = e.error === "no-speech" ? "没听到声音，再试一次" : "按住 说话";
    };
    rec.onend = () => {
      state.liveMode.isListening = false;
      listeningIndicator.style.display = "none";
      if (_isHoldingMic) {
        liveMicHint.textContent = "正在识别…";
      }
    };
    state.liveMode.recognition = rec;
    return true;
  }

  function startListening() {
    if (!state.liveMode.recognition) return;
    if (state.liveMode.isListening) {
      state.liveMode.recognition.stop();
      return;
    }
    state.liveMode.isListening = true;
    listeningIndicator.style.display = "block";
    try { state.liveMode.recognition.start(); } catch (e) { /* ignore */ }
  }

  // ===== 对话录制 =====

  async function startLiveRecording() {
    if (!state.liveMode.enabled || state.liveMode.isRecording) return;
    if (!canvas.captureStream || !window.MediaRecorder) {
      showToast("当前浏览器不支持录制");
      return;
    }

    // 切换到 gibberish 模式以便捕获角色声音（TTS 走系统输出，无法被 Web Audio 捕获）
    for (const s of state.subjects) {
      s._prevVoiceMode = s.voiceMode;
      s.voiceMode = "gibberish";
    }

    // 确保音频上下文活跃 + 预播放一段无声 gibberish 以激活 audioDestination 音轨
    await ensureAudio(false);
    if (!audioDestination || !audioDestination.stream) {
      showToast("音频系统未就绪，请重试");
      return;
    }

    // 轻触发音频图，让 MediaStreamDestination 生成音轨
    if (audioCtx && audioCtx.state === "running" && audioDestination.stream.getAudioTracks().length === 0) {
      const warmOsc = audioCtx.createOscillator();
      const warmGain = audioCtx.createGain();
      warmGain.gain.value = 0.001; // 几乎听不到
      warmOsc.connect(warmGain);
      warmGain.connect(audioDestination);
      warmOsc.start(audioCtx.currentTime);
      warmOsc.stop(audioCtx.currentTime + 0.05);
    }

    // 1. Canvas 视频流
    const videoStream = canvas.captureStream(30);
    const videoTracks = videoStream.getVideoTracks();

    // 2. 麦克风音频（从摄像头流中拿，startCamera 已请求 audio+video 一起）
    const micTracks = state.liveMode.cameraStream
      ? state.liveMode.cameraStream.getAudioTracks()
      : [];

    // 3. 角色声音（来自 audioDestination — gibberish）
    const gibberishTracks = audioDestination.stream.getAudioTracks();

    // 合并所有轨道
    const allTracks = [...videoTracks, ...micTracks, ...gibberishTracks];
    if (allTracks.length === 0) {
      showToast("无可录制的轨道");
      return;
    }
    const mergedStream = new MediaStream(allTracks);

    // 选择编码格式（优先带音频的）
    let mimeType = "";
    for (const m of ["video/webm;codecs=vp9,opus", "video/webm;codecs=vp8,opus", "video/webm;codecs=vp9", "video/webm;codecs=vp8", "video/webm", "video/mp4"]) {
      if (MediaRecorder.isTypeSupported(m)) { mimeType = m; break; }
    }

    const recorder = new MediaRecorder(mergedStream, mimeType ? { mimeType } : {});
    state.liveMode.mediaRecorder = recorder;
    state.liveMode.recordedChunks = [];
    state.liveMode.recordStream = mergedStream;
    state.liveMode.isRecording = true;
    state.liveMode.recordStartTime = Date.now();

    recorder.ondataavailable = (e) => {
      if (e.data.size > 0) state.liveMode.recordedChunks.push(e.data);
    };
    recorder.onstop = () => {
      saveRecordedVideo();
    };
    recorder.onerror = (e) => {
      console.error("Recorder error:", e);
      stopLiveRecording(true);
    };

    recorder.start(500);

    // UI
    if (liveRecordBtn) { liveRecordBtn.classList.add("recording"); liveRecordBtn.textContent = "⏹"; }
    if (recordingTimer) { recordingTimer.style.display = "block"; }
    updateRecordingTimer();
    state.liveMode.recordTimerInterval = setInterval(updateRecordingTimer, 500);

    showToast("开始录制 — 画面+你的声音+角色声音");
  }

  function stopLiveRecording(silent = false) {
    if (!state.liveMode.isRecording) return;

    if (state.liveMode.mediaRecorder && state.liveMode.mediaRecorder.state !== "inactive") {
      state.liveMode.mediaRecorder.stop();
    }

    // 释放合并流（不杀原始 cameraStream 的音频轨，只杀 merged stream 的引用）
    if (state.liveMode.recordStream) {
      state.liveMode.recordStream.getTracks().forEach(t => {
        // 只停 video/gibberish 轨，不停 camera 的音频轨
        if (t.kind !== "audio" || !state.liveMode.cameraStream || !state.liveMode.cameraStream.getAudioTracks().includes(t)) {
          t.stop();
        }
      });
      state.liveMode.recordStream = null;
    }

    // 恢复原来的发音模式
    for (const s of state.subjects) {
      if (s._prevVoiceMode) { s.voiceMode = s._prevVoiceMode; delete s._prevVoiceMode; }
    }

    state.liveMode.isRecording = false;
    if (state.liveMode.recordTimerInterval) {
      clearInterval(state.liveMode.recordTimerInterval);
      state.liveMode.recordTimerInterval = null;
    }

    // UI
    if (liveRecordBtn) { liveRecordBtn.classList.remove("recording"); liveRecordBtn.textContent = "⏺"; }
    if (recordingTimer) { recordingTimer.style.display = "none"; }

    if (!silent) showToast("录制完成，正在保存…");
  }

  function updateRecordingTimer() {
    if (!state.liveMode.isRecording || !recordingTimer) return;
    const elapsed = Math.floor((Date.now() - state.liveMode.recordStartTime) / 1000);
    const min = String(Math.floor(elapsed / 60)).padStart(2, "0");
    const sec = String(elapsed % 60).padStart(2, "0");
    recordingTimer.textContent = `● ${min}:${sec}`;
  }

  function saveRecordedVideo() {
    const chunks = state.liveMode.recordedChunks;
    if (!chunks.length) {
      showToast("录制内容为空");
      return;
    }
    const mimeType = state.liveMode.mediaRecorder?.mimeType || "video/webm";
    const ext = mimeType.includes("mp4") ? "mp4" : "webm";
    const blob = new Blob(chunks, { type: mimeType });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `对话记录_${new Date().toISOString().slice(0,10)}.${ext}`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 5000);
    state.liveMode.recordedChunks = [];
    showToast("视频已保存");
  }

  function pickPhrase(key = "happy") {
    const list = emotions[key]?.phrases || emotions.happy.phrases;
    return list[Math.floor(Math.random() * list.length)];
  }

  function normalizeDialogueLines(text, emotion = "happy", persona = "") {
    const raw = String(text || "")
      .replace(/\r\n/g, "\n")
      .split("\n")
      .map(line => line.trim())
      .filter(Boolean);

    if (raw.length > 0) return raw.slice(0, 12);
    return generateDialogueLines(persona, emotion);
  }

  function syncLineEmotions(subject, lines, fallbackEmotion = "happy") {
    const source = Array.isArray(subject.lineEmotions) ? subject.lineEmotions.slice() : [];
    subject.lineEmotions = lines.map((_, index) => source[index] || fallbackEmotion);
    return subject.lineEmotions;
  }

  function generateDialogueLines(personaText, emotion = "happy") {
    const persona = String(personaText || "").trim();
    const mood = emotions[emotion] || emotions.happy;
    const personaBits = persona
      ? persona.split(/[，,。.!！？?\s]+/).map(s => s.trim()).filter(Boolean).slice(0, 4)
      : [];

    const fallbackHooks = {
      happy: ["今天状态很好", "我想把快乐分给你", "你看，我是不是很亮眼"],
      surprise: ["等等，刚刚发生了什么", "我真的没有想到", "这也太突然了"],
      angry: ["我现在有点不爽", "别来惹我", "先让我缓一缓"],
      rage: ["我已经快炸了", "别再试探我的底线", "今天谁都别碰我"],
      sad: ["我有点委屈", "其实我只是想被理解", "能不能陪我一下"],
      shy: ["我先躲一下", "别一直盯着我", "我其实有点不好意思"],
      smug: ["我已经看穿了", "这波我很懂", "我知道我很厉害"],
      sleepy: ["我真的困了", "让我再眯一会儿", "电量快见底了"],
      excited: ["我已经等不及了", "走，我们冲", "这太好玩了"],
      confused: ["我有点没看懂", "这题怎么解", "我再想想"],
      scared: ["救命，我好怕", "你别吓我", "心里发毛"],
      nervous: ["我有点慌", "感觉要出事", "心跳好快"],
      embarrassed: ["假装我不存在", "我不是故意的", "脚趾抠出三室一厅"],
      bored: ["啊…好无聊", "有没有事做", "我已经石化了"],
      expecting: ["好期待啊", "快到快到", "我已经在倒数了"],
      moved: ["谢谢你", "我有点想哭", "你真的好暖"],
      jealous: ["凭什么啊", "哼，我不稀罕", "我也可以的"],
      mocking: ["就这？", "哈哈笑死我了", "你不是认真的吧"],
      worried: ["你没事吧", "我有点担心你", "希望你一切顺利"],
      playful: ["嘿嘿被我发现了", "来抓我呀", "我又皮了一下"],
      pleading: ["求求你啦", "就这一次嘛", "你最好了啦"],
      complaining: ["怎么又是我", "这不公平", "我真的累了"],
      curious: ["诶这是什么", "我想看看", "还能这样？"],
      proud: ["这可是我做的", "我太厉害了", "看看我的成果"],
      cool: ["不用解释", "我就静静看着", "已经习惯了"],
    };

    const traitHooks = personaBits.length ? personaBits : ["我有自己的小脾气", "我会认真观察", "我喜欢把话说清楚"];
    const moodHooks = fallbackHooks[emotion] || fallbackHooks.happy;
    const opener = persona
      ? `我这个${personaBits[0] || "小家伙"}`
      : mood.label + "状态启动";

    const pool = [
      opener,
      traitHooks[0] ? `我其实${traitHooks[0]}` : `我现在${moodHooks[0]}`,
      traitHooks[1] ? `平时我会${traitHooks[1]}` : moodHooks[1],
      traitHooks[2] ? `所以我会${traitHooks[2]}` : moodHooks[2],
      `现在的我就是${mood.label}一点`,
      `如果你理解我，我就会更开心`,
      `我想法很简单：${personaBits[0] || moodHooks[0]}`,
      `我的特点是${personaBits[1] || traitHooks[0] || moodHooks[1]}`,
    ];

    const lines = [];
    for (const item of pool) {
      if (!item || lines.includes(item)) continue;
      lines.push(item);
      if (lines.length >= 6) break;
    }
    return lines.length ? lines : [moodHooks[0], moodHooks[1], moodHooks[2]];
  }

  function getDialogueLines(subject) {
    const lines = normalizeDialogueLines(subject.dialogueText || "", subject.emotion, subject.persona);
    subject.dialogueLines = lines;
    syncLineEmotions(subject, lines, subject.emotion || "happy");
    return lines;
  }

  function getCurrentDialogueState(subject, now) {
    const lines = getDialogueLines(subject);
    if (!lines.length) return { line: "", index: 0, emotion: subject.emotion || "happy", lines };
    const speed = Math.max(0.8, Number(subject.lineSpeed) || 3.5);
    const elapsed = (now - (subject.dialogueStartedAt || state.startedAt)) / 1000;
    const index = Math.floor(elapsed / speed) % lines.length;
    const emotion = subject.lineEmotions?.[index] || subject.emotion || "happy";
    return { line: lines[index], index, emotion, lines, speed };
  }

  function setAllLineEmotions(subject, emotion) {
    const lines = getDialogueLines(subject);
    subject.lineEmotions = lines.map(() => emotion);
  }

  function setLineEmotion(subject, index, emotion) {
    const lines = getDialogueLines(subject);
    subject.lineEmotions[index] = emotion;
    if (subject.lineEmotions.length < lines.length) {
      subject.lineEmotions = lines.map((_, i) => subject.lineEmotions[i] || subject.emotion || emotion);
    }
  }

  function createSubject(overrides = {}) {
    const index = state.subjects.length;
    const baseEmotion = overrides.emotion || "happy";
    const baseMood = emotions[baseEmotion] || emotions.happy;
    const basePhrase = pickPhrase(baseEmotion);
    return {
      id: makeId(),
      x: CANVAS_W * 0.5 + (index % 2 === 0 ? -70 : 70),
      y: CANVAS_H * 0.56 + Math.floor(index / 2) * 28,
      bodySize: 118,
      faceScale: 1,
      faceStyle: "classic",
      textScale: 28,
      emotion: baseEmotion,
      color: overrides.color || baseMood.swatch,
      legMode: "stand",
      bubbleStyle: "speech",
      bubbleScale: 1,
      voiceType: "mandarin",
      voiceMode: "tts",
      voiceEnabled: true,
      voiceVolume: 0.58,
      voicePitch: 1.0,
      lastSpokenLineIndex: null,
      speechRate: 1.0,
      dialogueText: basePhrase,
      dialogueLines: [basePhrase],
      lineEmotions: [baseEmotion],
      persona: "盛明兰",
      topic: "",
      lineSpeed: 3.5,
      dialogueStartedAt: performance.now(),
      autoTrack: true,
      showBody: true,
      showFace: true,
      showLegs: false,
      showText: true,
      showFill: true,
      phase: Math.random() * Math.PI * 2,
      ...overrides
    };
  }

  function addSubject(overrides = {}, select = true) {
    const subject = createSubject(overrides);
    state.subjects.push(subject);
    if (select) state.selectedId = subject.id;
    refreshControls();
    return subject;
  }

  function duplicateSelectedSubject() {
    const subject = selectedSubject();
    if (!subject) return;
    const { id, phase, ...rest } = subject;
    const copy = createSubject({
      ...rest,
      x: clamp(subject.x + 60, 80, CANVAS_W - 80),
      y: clamp(subject.y + 52, 80, CANVAS_H - 80),
      dialogueText: subject.dialogueText || pickPhrase(subject.emotion),
      dialogueLines: normalizeDialogueLines(subject.dialogueText, subject.emotion, subject.persona),
      dialogueStartedAt: performance.now()
    });
    state.subjects.push(copy);
    state.selectedId = copy.id;
    refreshControls();
    showToast("已复制一个主体");
  }

  function removeSelectedSubject() {
    if (!state.subjects.length) return;
    if (state.subjects.length === 1) {
      state.subjects[0] = createSubject({ x: CANVAS_W * 0.5, y: CANVAS_H * 0.56 });
      state.selectedId = state.subjects[0].id;
    } else {
      const id = state.selectedId;
      state.subjects = state.subjects.filter(subject => subject.id !== id);
      state.selectedId = state.subjects[0].id;
    }
    refreshControls();
  }

  function selectSubject(id) {
    state.selectedId = id;
    refreshControls();
  }

  function selectedSubjectIndex() {
    return Math.max(0, state.subjects.findIndex(subject => subject.id === state.selectedId));
  }

  function refreshControls() {
    const subject = selectedSubject();
    const enabled = Boolean(subject);
    duplicateSubjectBtn.disabled = !enabled;
    deleteSubjectBtn.disabled = !enabled;
    detectBtn.disabled = !enabled || !state.source;
    centerBtn.disabled = !enabled || !state.source;
    bodySlider.disabled = !enabled;
    faceSlider.disabled = !enabled;
    textSlider.disabled = !enabled;
    bodyToggle.disabled = !enabled;
    faceToggle.disabled = !enabled;
    legToggle.disabled = !enabled;
    fillToggle.disabled = !enabled;
    textToggle.disabled = !enabled;
    captionInput.disabled = !enabled;
    topicInput.disabled = !enabled;
    aiGenBtn.disabled = !enabled;
    speedSlider.disabled = !enabled;
    voiceVolumeSlider.disabled = !enabled;
    voicePitchSlider.disabled = !enabled;
    speechRateSlider.disabled = !enabled;
    voiceToggle.disabled = !enabled;
    previewVoiceBtn.disabled = !enabled;
    shuffleBtn.disabled = !enabled;

    buildSubjectButtons();
    buildPersonaChips();
    buildEmotionButtons();
    buildFaceStyleButtons();
    buildLegButtons();
    buildBubbleButtons();
    buildVoiceModeButtons();
    buildVoiceButtons();
    buildLineEmotionPanel();

    if (!subject) {
      captionInput.value = "";
      if (personaDesc) personaDesc.textContent = "";
      lineEmotionPanel.innerHTML = "";
      if (topicSubjectTag) topicSubjectTag.textContent = "";
      if (speedSubjectTag) speedSubjectTag.textContent = "";
      if (speechRateTag) speechRateTag.textContent = "";
      if (voicePitchTag) voicePitchTag.textContent = "";
      return;
    }

    const idx = selectedSubjectIndex() + 1;
    const total = state.subjects.length;
    if (topicSubjectTag) topicSubjectTag.textContent = `${idx}/${total} 号主体`;
    if (speedSubjectTag) {
      const liveSpeed = Number(speedSlider.value || subject.lineSpeed || 3.5).toFixed(1);
      speedSubjectTag.textContent = `${liveSpeed}×`;
    }

    captionInput.value = subject.dialogueText || "";
    topicInput.value = subject.topic || "";
    bodySlider.value = Math.round(subject.bodySize);
    faceSlider.value = Math.round(subject.faceScale * 100);
    textSlider.value = Math.round(subject.textScale);
    speedSlider.value = Number(subject.lineSpeed || 3.5).toFixed(1);
    voiceVolumeSlider.value = Math.round(clamp((subject.voiceVolume ?? 0.58) * 100, 0, 100));
    voicePitchSlider.value = Number(subject.voicePitch || 1.0).toFixed(2);
    if (voicePitchTag) voicePitchTag.textContent = `${Number(subject.voicePitch || 1.0).toFixed(2)}×`;
    speechRateSlider.value = Number(subject.speechRate || 1.0).toFixed(2);
    if (speechRateTag) speechRateTag.textContent = `${Number(subject.speechRate || 1.0).toFixed(2)}×`;
    voiceToggle.checked = subject.voiceEnabled !== false;
    followToggle.checked = subject.autoTrack !== false;
    bodyToggle.checked = subject.showBody !== false;
    faceToggle.checked = subject.showFace !== false;
    legToggle.checked = subject.showLegs === true;
    fillToggle.checked = subject.showFill !== false;
    textToggle.checked = subject.showText !== false;

    // 同步实时对话面板
    if (liveToggle) liveToggle.checked = state.liveMode.enabled;
    if (liveTopicInput && !liveTopicInput.dataset.userEdited) {
      liveTopicInput.value = subject.topic || "";
    }
    if (liveStatus && state.liveMode.enabled) {
      const selSubj = state.liveMode.selectedSubjectId
        ? state.subjects.find(s => s.id === state.liveMode.selectedSubjectId)
        : null;
      liveStatus.textContent = selSubj
        ? `对话对象：${emotions[selSubj.emotion]?.label || "—"} / 共 ${state.liveMode.messages.length} 条消息`
        : "双击画面选择对话对象";
    }
  }

  function buildSubjectButtons() {
    subjectList.innerHTML = "";
    state.subjectButtons.clear();
    if (!state.subjects.length) {
      const empty = document.createElement("button");
      empty.type = "button";
      empty.className = "chip";
      empty.disabled = true;
      empty.textContent = "点击新增主体";
      subjectList.appendChild(empty);
      return;
    }

    state.subjects.forEach((subject, index) => {
      const mood = emotions[subject.emotion] || emotions.happy;
      const btn = document.createElement("button");
      btn.type = "button";
      btn.dataset.subjectId = subject.id;
      btn.className = `chip subject-chip${subject.id === state.selectedId ? " active" : ""}`;
      const labelEl = document.createElement("span");
      labelEl.className = "label";
      labelEl.textContent = mood.label;
      const badge = document.createElement("span");
      badge.className = "badge";
      badge.textContent = index + 1;
      btn.append(labelEl, badge);
      btn.addEventListener("click", () => selectSubject(subject.id));
      subjectList.appendChild(btn);
      state.subjectButtons.set(subject.id, { btn, labelEl });
    });

  function updateSubjectEmotionLabels(now) {
    if (!state.subjectButtons.size) return;
    for (const subject of state.subjects) {
      const entry = state.subjectButtons.get(subject.id);
      if (!entry) continue;
      const dialogue = getCurrentDialogueState(subject, now);
      const mood = emotions[dialogue.emotion] || emotions[subject.emotion] || emotions.happy;
      if (entry.labelEl.textContent !== mood.label) {
        entry.labelEl.textContent = mood.label;
      }
    }
  }

  function buildEmotionButtons() {
    emotionList.innerHTML = "";
    const subject = selectedSubject();
    Object.entries(emotions).forEach(([key, mood]) => {
      const btn = document.createElement("button");
      btn.className = `chip${subject && subject.emotion === key ? " active" : ""}`;
      btn.type = "button";
      btn.innerHTML = `<span class="swatch" style="--swatch:${mood.swatch}"></span>${mood.label}`;
      btn.addEventListener("click", () => {
        const target = selectedSubject();
        if (!target) return;
        target.emotion = key;
        if (!target.dialogueText || target.dialogueLines.length <= 1) {
          const lines = generateDialogueLines(target.persona, key);
          target.dialogueText = lines.join("\n");
          target.dialogueLines = lines;
        }
        setAllLineEmotions(target, key);
        resetDialogueVoiceState(target);
        target.dialogueStartedAt = performance.now();
        refreshControls();
      });
      emotionList.appendChild(btn);
    });
  }

  const VOICE_MODES = {
    tts: { label: "🔊 朗读对白" },
    gibberish: { label: "🎵 趣味发音" }

  function buildVoiceModeButtons() {
    if (!voiceModeList) return;
    voiceModeList.innerHTML = "";
    const subject = selectedSubject();
    const ttsAvailable = 'speechSynthesis' in window;
    Object.entries(VOICE_MODES).forEach(([key, mode]) => {
      const btn = document.createElement("button");
      const isActive = subject && (subject.voiceMode || "tts") === key;
      btn.className = `chip${isActive ? " active" : ""}`;
      btn.type = "button";
      btn.textContent = mode.label;
      btn.disabled = key === "tts" && !ttsAvailable;
      btn.title = key === "tts" && !ttsAvailable
        ? "当前浏览器不支持 Web Speech API，将回退到趣味发音"
        : "";
      btn.addEventListener("click", () => {
        const target = selectedSubject();
        if (!target) return;
        if (key === "tts" && !ttsAvailable) {
          showToast("当前浏览器不支持朗读，已用趣味发音");
          return;

        target.voiceMode = key;
        // 试听一下当前模式
        if (target.voiceEnabled !== false) {
          const dialogue = getCurrentDialogueState(target, performance.now());
          if (key === "tts") playTTS(target, dialogue, true);
          else playGibberish(target, { ...dialogue, index: `mode_${Date.now()}` }, true);

    personaChipList.innerHTML = "";

    const currentKey = subject ? subject.persona : "盛明兰";

    Object.entries(PERSONA_PRESETS).forEach(([key, p]) => {
