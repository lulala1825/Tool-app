  function buildLineEmotionPanel() {
    lineEmotionPanel.innerHTML = "";
    const subject = selectedSubject();
    if (!subject) {
      return;
    }

    const lines = getDialogueLines(subject);
    if (!lines.length) {
      const empty = document.createElement("div");
      empty.className = "line-preview";
      empty.textContent = "先输入台词，每行一句。";
      lineEmotionPanel.appendChild(empty);
      return;
    }

    lines.forEach((line, index) => {
      const row = document.createElement("div");
      row.className = "line-row";

      const meta = document.createElement("div");
      meta.className = "line-meta";
      const label = document.createElement("div");
      label.className = "line-index";
      label.textContent = `第 ${index + 1} 句`;
      const preview = document.createElement("div");
      preview.className = "line-preview";
      preview.textContent = line;
      meta.append(label, preview);

      const select = document.createElement("select");
      select.className = "line-select";
      select.value = subject.lineEmotions?.[index] || subject.emotion || "happy";
      Object.entries(emotions).forEach(([key, mood]) => {
        const option = document.createElement("option");
        option.value = key;
        option.textContent = mood.label;
        if (option.value === select.value) option.selected = true;
        select.appendChild(option);
      });
      select.addEventListener("change", () => {
        const target = selectedSubject();
        if (!target) return;
        setLineEmotion(target, index, select.value);
        resetDialogueVoiceState(target);
      });

      row.append(meta, select);
      lineEmotionPanel.appendChild(row);
    });
  }

  function mediaDimensions() {
    if (!state.source) return { width: CANVAS_W, height: CANVAS_H };
    if (state.sourceType === "video") {
      return {
        width: sourceVideo.videoWidth || CANVAS_W,
        height: sourceVideo.videoHeight || CANVAS_H
      };
    }
    return {
      width: state.source.naturalWidth || CANVAS_W,
      height: state.source.naturalHeight || CANVAS_H
    };
  }

  function coverFit(srcW, srcH, dstW = CANVAS_W, dstH = CANVAS_H) {
    const scale = Math.max(dstW / srcW, dstH / srcH);
    const w = srcW * scale;
    const h = srcH * scale;
    return { x: (dstW - w) / 2, y: (dstH - h) / 2, w, h, scale };
  }

  function drawMedia(targetCtx, targetW, targetH) {
    if (!state.source) return;
    const dims = mediaDimensions();
    const fit = coverFit(dims.width, dims.height, targetW, targetH);
    const src = state.sourceType === "video" ? sourceVideo : state.source;
    targetCtx.drawImage(src, fit.x, fit.y, fit.w, fit.h);
  }

  function captureFrameImageData() {
    detectCtx.clearRect(0, 0, DETECT_W, DETECT_H);
    drawMedia(detectCtx, DETECT_W, DETECT_H);
    try {
      return detectCtx.getImageData(0, 0, DETECT_W, DETECT_H);
    } catch (err) {
      showToast("浏览器限制了画面读取，请换成本地相册素材。");
      return null;
    }
  }

  function globalDetectSubject(imageData, subject) {
    const data = imageData.data;
    const prevX = subject ? subject.x / CANVAS_W * DETECT_W : DETECT_W * 0.5;
    const prevY = subject ? subject.y / CANVAS_H * DETECT_H : DETECT_H * 0.5;
    const focusRadius = subject ? Math.max(26, subject.bodySize / CANVAS_W * DETECT_W * 1.55) : 40;
    let total = 0;
    let sumX = 0;
    let sumY = 0;
    let minX = DETECT_W;
    let minY = DETECT_H;
    let maxX = 0;
    let maxY = 0;

    for (let y = 1; y < DETECT_H - 1; y += 2) {
      for (let x = 1; x < DETECT_W - 1; x += 2) {
        const i = (y * DETECT_W + x) * 4;
        const r = data[i];
        const g = data[i + 1];
        const b = data[i + 2];
        const lum = 0.299 * r + 0.587 * g + 0.114 * b;
        const right = ((y * DETECT_W + x + 1) * 4);
        const down = (((y + 1) * DETECT_W + x) * 4);
        const lumRight = 0.299 * data[right] + 0.587 * data[right + 1] + 0.114 * data[right + 2];
        const lumDown = 0.299 * data[down] + 0.587 * data[down + 1] + 0.114 * data[down + 2];
        const edge = Math.abs(lum - lumRight) + Math.abs(lum - lumDown);
        const saturation = Math.max(r, g, b) - Math.min(r, g, b);
        const cx = Math.abs(x / DETECT_W - 0.5);
        const cy = Math.abs(y / DETECT_H - 0.52);
        let score = edge * 1.1 + saturation * 0.42;
        score *= Math.max(0.2, 1 - Math.hypot(cx * 1.2, cy) * 0.9);

        if (subject) {
          const d = Math.hypot(x - prevX, y - prevY);
          if (d > focusRadius * 2.1) score *= 0.12;
          else score *= 1 + Math.max(0, 1 - d / (focusRadius * 2.1)) * 1.35;
        }

        if (score > 42) {
          total += score;
          sumX += x * score;
          sumY += y * score;
          minX = Math.min(minX, x);
          minY = Math.min(minY, y);
          maxX = Math.max(maxX, x);
          maxY = Math.max(maxY, y);
        }
      }
    }

    if (total < 1000) {
      return { x: CANVAS_W * 0.5, y: CANVAS_H * 0.48, bodySize: subject ? subject.bodySize : 125 };
    }

    const x = sumX / total / DETECT_W * CANVAS_W;
    const y = sumY / total / DETECT_H * CANVAS_H;
    const extent = Math.max(maxX - minX, maxY - minY) / DETECT_W * CANVAS_W;
    const bodySize = Math.max(76, Math.min(172, extent * 0.62));
    return { x, y, bodySize };
  }

  function localTrackSubject(imageData, subject) {
    const centerX = subject.x / CANVAS_W * DETECT_W;
    const centerY = subject.y / CANVAS_H * DETECT_H;
    const searchR = Math.max(18, subject.bodySize / CANVAS_W * DETECT_W * 0.42);
    const radius = Math.max(12, subject.bodySize / CANVAS_W * DETECT_W * 0.46);
    const offsets = [-0.48, -0.24, 0, 0.24, 0.48];
    let best = { score: -Infinity, x: centerX, y: centerY };

    for (const ox of offsets) {
      for (const oy of offsets) {
        const cx = clamp(centerX + ox * searchR, radius, DETECT_W - radius - 1);
        const cy = clamp(centerY + oy * searchR, radius, DETECT_H - radius - 1);
        const sample = scorePatch(imageData, cx, cy, radius);
        const distancePenalty = Math.hypot(cx - centerX, cy - centerY) / (searchR * 1.9);
        const score = sample.score - distancePenalty * 18;
        if (score > best.score) {
          best = { score, x: sample.x, y: sample.y };
        }
      }
    }

    return {
      x: best.x / DETECT_W * CANVAS_W,
      y: best.y / DETECT_H * CANVAS_H
    };
  }

  function scorePatch(imageData, cx, cy, radius) {
    const data = imageData.data;
    const minX = Math.max(1, Math.floor(cx - radius));
    const maxX = Math.min(DETECT_W - 2, Math.ceil(cx + radius));
    const minY = Math.max(1, Math.floor(cy - radius));
    const maxY = Math.min(DETECT_H - 2, Math.ceil(cy + radius));
    let score = 0;
    let sumX = 0;
    let sumY = 0;

    for (let y = minY; y <= maxY; y += 2) {
      for (let x = minX; x <= maxX; x += 2) {
        const dx = x - cx;
        const dy = y - cy;
        const dist = Math.hypot(dx, dy) / radius;
        if (dist > 1) continue;
        const i = (y * DETECT_W + x) * 4;
        const r = data[i];
        const g = data[i + 1];
        const b = data[i + 2];
        const lum = 0.299 * r + 0.587 * g + 0.114 * b;
        const right = ((y * DETECT_W + x + 1) * 4);
        const down = (((y + 1) * DETECT_W + x) * 4);
        const lumRight = 0.299 * data[right] + 0.587 * data[right + 1] + 0.114 * data[right + 2];
        const lumDown = 0.299 * data[down] + 0.587 * data[down + 1] + 0.114 * data[down + 2];
        const edge = Math.abs(lum - lumRight) + Math.abs(lum - lumDown);
        const saturation = Math.max(r, g, b) - Math.min(r, g, b);
        const weight = Math.max(0, 1 - dist);
        const local = (edge * 1.1 + saturation * 0.42) * weight;
        score += local;
        sumX += x * local;
        sumY += y * local;
      }
    }

    if (score <= 0) return { score: -Infinity, x: cx, y: cy };
    return { score, x: sumX / score, y: sumY / score };
  }

  function trackSubjects(imageData) {
    for (const subject of state.subjects) {
      if (subject.id === state.draggingId) continue;
      if (subject.autoTrack === false) continue;
      const next = localTrackSubject(imageData, subject);
      subject.x += (next.x - subject.x) * 0.18;
      subject.y += (next.y - subject.y) * 0.18;
    }
  }

  function detectSelectedSubject(global = false) {
    const subject = selectedSubject();
    if (!subject || !state.source) return;
    const imageData = captureFrameImageData();
    if (!imageData) return;
    const next = global ? globalDetectSubject(imageData, subject) : localTrackSubject(imageData, subject);
    subject.x = clamp(next.x, 40, CANVAS_W - 40);
    subject.y = clamp(next.y, 40, CANVAS_H - 40);
    subject.bodySize = clamp(next.bodySize || subject.bodySize, 54, 220);
    bodySlider.value = Math.round(subject.bodySize);
  }

  function drawFallbackBackground(now) {
    const t = now * 0.001;
    const grad = ctx.createLinearGradient(0, 0, CANVAS_W, CANVAS_H);
    grad.addColorStop(0, "#23252d");
    grad.addColorStop(0.55, "#17191e");
    grad.addColorStop(1, "#2a201b");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    for (let i = 0; i < 24; i++) {
      const x = (Math.sin(i * 1.7 + t * 0.42) * 0.5 + 0.5) * CANVAS_W;
      const y = (i * 73 + t * 12) % CANVAS_H;
      ctx.fillStyle = `rgba(255,255,255,${0.03 + (i % 5) * 0.01})`;
      ctx.fillRect(x, y, 2 + (i % 4), 2 + (i % 4));
    }
  }

  function render(now = performance.now()) {
    ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
    if (state.source) {
      drawMedia(ctx, CANVAS_W, CANVAS_H);
      ctx.fillStyle = "rgba(0,0,0,0.03)";
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
      if (state.sourceType === "video" && !state.draggingId && now - state.lastTrackAt > 150) {
        state.lastTrackAt = now;
        const imageData = captureFrameImageData();
        if (imageData) trackSubjects(imageData);
      }
      const ordered = [...state.subjects].sort((a, b) => a.y - b.y);
      for (const subject of ordered) {
        drawSubject(subject, now);
      }
    } else {
      drawFallbackBackground(now);
    }
    requestAnimationFrame(render);
  }

  function drawSubject(subject, now) {
    const t = (now - state.startedAt) * 0.001;
    const pulse = Math.sin(t * 5.2 + subject.phase);
    const quick = Math.sin(t * 12 + subject.phase * 1.6);
    const bodyR = subject.bodySize;
    const faceR = bodyR * subject.faceScale * 0.82;
    const bodyY = subject.y + pulse * bodyR * 0.03;
    const faceY = bodyY - bodyR * 0.21 + pulse * bodyR * 0.03;
    const dialogue = getCurrentDialogueState(subject, now);
    const mood = emotions[dialogue.emotion] || emotions.happy;
    const bubbleText = dialogue.line;

    if (!state.exporting || state.recordingAudio) {
      playGibberish(subject, dialogue);
    }

    ctx.save();
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    if (subject.showLegs === true) {
      drawLegs(subject, mood, subject.x, bodyY, bodyR, t, pulse, quick);
    }
    if (subject.showBody !== false) {
      drawBody(subject, mood, subject.x, bodyY, bodyR, pulse, quick);
      drawArms(subject, mood, subject.x, bodyY, bodyR, t, pulse, quick);
    }
    if (subject.showFace !== false) {
    drawFace(subject, mood, subject.x, faceY, faceR, t, pulse);
    }
    if (subject.showText !== false) {
      drawBubble(subject, mood, subject.x, bodyY, bodyR, bubbleText);
    }
    ctx.restore();
  }

  function drawBody(subject, mood, x, y, bodyR, pulse, quick) {
    const bodyW = bodyR * 1.04;
    const bodyH = bodyR * 1.38;
    ctx.save();
    ctx.globalAlpha = 0.24;
    ctx.fillStyle = mood.swatch;
    ctx.beginPath();
    ctx.ellipse(x, y + bodyR * 0.04, bodyW * 0.58, bodyH * 0.52 + Math.sin(quick) * bodyR * 0.02, -0.08, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.08;
    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.ellipse(x - bodyR * 0.12, y - bodyR * 0.14, bodyR * 0.34, bodyR * 0.28, -0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawFace(subject, mood, x, y, faceR, t, pulse) {
    const style = subject.faceStyle || "classic";
    ctx.save();
    drawFaceBase(subject, mood, x, y, faceR, t, pulse);
    ctx.restore();

    ctx.save();
    drawEyes(subject, mood, x, y, faceR, t);
    drawBrows(subject, mood, x, y, faceR, t);
    drawMouth(subject, mood, x, y, faceR, t, pulse);
    drawCheeks(subject, mood, x, y, faceR, t);
    drawSparkMarks(subject, mood, x, y, faceR, t);
    drawFaceAccessories(subject, mood, x, y, faceR, t, pulse);
    ctx.restore();
  }

  function drawFaceBase(subject, mood, x, y, r, t, pulse) {
    const style = subject.faceStyle || "classic";
    if (style === "line" || style === "sticker" || style === "cool") return;
    ctx.globalAlpha = style === "chibi" ? 0.34 : style === "kawaii" ? 0.2 : style === "dramatic" ? 0.22 : 0.14;
    ctx.fillStyle = style === "chibi" ? mood.swatch : mood.swatch;
    ctx.beginPath();
    if (style === "chibi") {
      const wobble = Math.sin(t * 3 + subject.phase) * r * 0.03;
      ctx.ellipse(x + wobble, y + r * 0.08, r * 0.9, r * 0.68 + pulse * r * 0.02, -0.08, 0, Math.PI * 2);
    } else {
      ctx.ellipse(x, y + r * 0.07, r * 0.84, r * 0.6, -0.05, 0, Math.PI * 2);
    }
    ctx.fill();
  }

  function eyeShape(x, y, w, h, rotation = 0) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rotation);
    ctx.beginPath();
    ctx.ellipse(0, 0, w, h, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.restore();
  }

  function drawEyes(subject, mood, x, y, r, t) {
    const style = subject.faceStyle || "classic";
    const blink = Math.sin(t * 2.7) > 0.94 ? 0.18 : 1;
    const wide = mood.eye === "wide" || mood.eye === "spark" || style === "dramatic" ? 1.28 : style === "kawaii" ? 1.16 : 1;
    const tiny = mood.eye === "tiny" || style === "line" ? 0.72 : 1;
    const droop = mood.eye === "teary" || mood.eye === "sleepy" ? r * 0.05 : 0;
    const leftX = x - r * 0.22;
    const rightX = x + r * 0.22;
    const eyeY = y - r * 0.06 + droop;
    const eyeW = r * 0.16 * wide * tiny;
    const eyeH = r * 0.22 * wide * blink;

    ctx.lineWidth = Math.max(4, r * 0.035);
    ctx.strokeStyle = "#111";
    ctx.fillStyle = "#fff";

    if (style === "line") {
      ctx.lineWidth = Math.max(3, r * 0.03);
      ctx.beginPath();
      ctx.moveTo(leftX - eyeW, eyeY);
      ctx.quadraticCurveTo(leftX, eyeY + eyeH * 0.25, leftX + eyeW, eyeY);
      ctx.moveTo(rightX - eyeW, eyeY);
      ctx.quadraticCurveTo(rightX, eyeY + eyeH * 0.25, rightX + eyeW, eyeY);
      ctx.stroke();
    } else if (style === "cool") {
      drawCoolGlasses(x, eyeY, r, t);
    } else if (style === "glasses") {
      drawRoundGlasses(x, eyeY, r, t);
    } else if (style === "kawaii") {
      drawKawaiiEyes(leftX, rightX, eyeY, eyeW, eyeH, t, r);
    } else if (style === "sticker") {
      drawStickerEyes(leftX, rightX, eyeY, eyeW, eyeH, t, r);
    } else if (mood.eye === "angry") {
      eyeShape(leftX, eyeY, eyeW * 1.05, eyeH * 0.82, -0.08);
      eyeShape(rightX, eyeY, eyeW * 1.05, eyeH * 0.82, 0.08);
    } else if (mood.eye === "wink") {
      ctx.beginPath();
      ctx.moveTo(leftX - eyeW, eyeY);
      ctx.quadraticCurveTo(leftX, eyeY - eyeH * 0.45, leftX + eyeW, eyeY);
      ctx.stroke();
      eyeShape(rightX, eyeY, eyeW, eyeH * 0.92, 0.02);
    } else if (mood.eye === "half" || mood.eye === "sleepy") {
      ctx.beginPath();
      ctx.moveTo(leftX - eyeW, eyeY);
      ctx.quadraticCurveTo(leftX, eyeY + eyeH * 0.3, leftX + eyeW, eyeY);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(rightX - eyeW, eyeY);
      ctx.quadraticCurveTo(rightX, eyeY + eyeH * 0.3, rightX + eyeW, eyeY);
      ctx.stroke();
    } else if (mood.eye === "cross") {
      eyeShape(leftX, eyeY, eyeW * 1.02, eyeH * 0.92, -0.02);
      eyeShape(rightX, eyeY, eyeW * 1.02, eyeH * 0.92, 0.02);
      ctx.strokeStyle = "#111";
      ctx.lineWidth = Math.max(3, r * 0.03);
      ctx.beginPath();
      ctx.moveTo(leftX - r * 0.05, eyeY - r * 0.05);
      ctx.lineTo(leftX + r * 0.05, eyeY + r * 0.05);
      ctx.moveTo(leftX - r * 0.05, eyeY + r * 0.05);
      ctx.lineTo(leftX + r * 0.05, eyeY - r * 0.05);
      ctx.moveTo(rightX - r * 0.05, eyeY - r * 0.05);
      ctx.lineTo(rightX + r * 0.05, eyeY + r * 0.05);
      ctx.moveTo(rightX - r * 0.05, eyeY + r * 0.05);
      ctx.lineTo(rightX + r * 0.05, eyeY - r * 0.05);
      ctx.stroke();
    } else {
      eyeShape(leftX, eyeY, eyeW, eyeH, -0.02);
      eyeShape(rightX, eyeY, eyeW, eyeH, 0.02);
    }

    if (!["cool", "glasses", "kawaii", "sticker", "line"].includes(style)) {
      const look = Math.sin(t * 1.7) * r * 0.022;
      ctx.fillStyle = "#111";
      const pupilR = r * (mood.eye === "spark" ? 0.062 : 0.054) * tiny;
      ctx.beginPath();
      ctx.arc(leftX + look, eyeY + r * 0.015, pupilR, 0, Math.PI * 2);
      ctx.arc(rightX + look, eyeY + r * 0.015, pupilR, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "rgba(255,255,255,0.86)";
      ctx.beginPath();
      ctx.arc(leftX + look + r * 0.018, eyeY - r * 0.018, r * 0.018, 0, Math.PI * 2);
      ctx.arc(rightX + look + r * 0.018, eyeY - r * 0.018, r * 0.018, 0, Math.PI * 2);
      ctx.fill();
    }

    if (mood.eye === "teary" || style === "dramatic") {
      ctx.fillStyle = "rgba(110,200,255,0.82)";
      ctx.beginPath();
      ctx.ellipse(leftX - r * 0.045, eyeY + r * 0.17, r * 0.028, r * 0.046, 0.2, 0, Math.PI * 2);
      ctx.ellipse(rightX + r * 0.045, eyeY + r * 0.17, r * 0.028, r * 0.046, -0.2, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawBrows(subject, mood, x, y, r, t) {
    const style = subject.faceStyle || "classic";
    if (style === "cool" || style === "glasses") return;
    const bounce = Math.sin(t * 6) * r * 0.012;
    ctx.strokeStyle = "#111";
    ctx.lineWidth = Math.max(4, r * (style === "line" ? 0.03 : 0.044));

    if (style === "kawaii" && (mood.brow === "soft" || mood.brow === "lift")) {
      ctx.lineWidth = Math.max(4, r * 0.035);
      ctx.beginPath();
      ctx.moveTo(x - r * 0.34, y - r * 0.31 - bounce);
      ctx.quadraticCurveTo(x - r * 0.22, y - r * 0.39, x - r * 0.12, y - r * 0.32);
      ctx.moveTo(x + r * 0.12, y - r * 0.32);
      ctx.quadraticCurveTo(x + r * 0.22, y - r * 0.39, x + r * 0.34, y - r * 0.31 - bounce);
      ctx.stroke();
      return;
    }

    if (style === "sticker" && mood.eye !== "angry") {
      ctx.lineWidth = Math.max(5, r * 0.052);
      ctx.beginPath();
      ctx.moveTo(x - r * 0.34, y - r * 0.27 - bounce);
      ctx.lineTo(x - r * 0.17, y - r * 0.27 - bounce);
      ctx.moveTo(x + r * 0.17, y - r * 0.27 + bounce);
      ctx.lineTo(x + r * 0.34, y - r * 0.27 + bounce);
      ctx.stroke();
      return;
    }

    if (mood.brow === "angry" || mood.brow === "rage") {
      const shake = mood.brow === "rage" ? Math.sin(t * 20) * r * 0.02 : 0;
      ctx.beginPath();
      ctx.moveTo(x - r * 0.4, y - r * 0.32 + shake);
      ctx.lineTo(x - r * 0.14, y - r * 0.22 - bounce);
      ctx.moveTo(x + r * 0.4, y - r * 0.32 - shake);
      ctx.lineTo(x + r * 0.14, y - r * 0.22 - bounce);
      ctx.stroke();
      return;
    }

    if (mood.brow === "sad") {
      ctx.beginPath();
      ctx.moveTo(x - r * 0.38, y - r * 0.23);
      ctx.quadraticCurveTo(x - r * 0.25, y - r * 0.34, x - r * 0.1, y - r * 0.27);
      ctx.moveTo(x + r * 0.38, y - r * 0.23);
      ctx.quadraticCurveTo(x + r * 0.25, y - r * 0.34, x + r * 0.1, y - r * 0.27);
      ctx.stroke();
      return;
    }

    const lift = mood.brow === "up" ? r * 0.12 : mood.brow === "lift" ? r * 0.08 : 0;
    const tilt = mood.brow === "tilt" ? r * 0.08 : 0;
    ctx.beginPath();
    ctx.moveTo(x - r * 0.38, y - r * 0.26 - lift - bounce);
    ctx.quadraticCurveTo(x - r * 0.24, y - r * 0.34 - lift, x - r * 0.1, y - r * 0.3 - lift + bounce + tilt);
    ctx.moveTo(x + r * 0.1, y - r * 0.3 - lift + bounce - tilt);
    ctx.quadraticCurveTo(x + r * 0.24, y - r * 0.34 - lift, x + r * 0.38, y - r * 0.26 - lift - bounce);
    ctx.stroke();
  }

  function drawMouth(subject, mood, x, y, r, t, pulse) {
    const style = subject.faceStyle || "classic";
    const wobble = Math.sin(t * 8) * 0.06;
    ctx.strokeStyle = "#111";
    ctx.lineWidth = Math.max(4, r * (style === "line" ? 0.032 : 0.04));
    ctx.fillStyle = "#8d1f23";

    if (style === "line") {
      drawLineStyleMouth(mood, x, y, r, t);
      return;
    }

    if (style === "kawaii" && (mood.mouth === "smile" || mood.mouth === "smirk")) {
      ctx.beginPath();
      ctx.moveTo(x - r * 0.16, y + r * 0.2);
      ctx.quadraticCurveTo(x - r * 0.06, y + r * 0.32 + pulse * r * 0.015, x, y + r * 0.23);
      ctx.quadraticCurveTo(x + r * 0.08, y + r * 0.32 - pulse * r * 0.015, x + r * 0.18, y + r * 0.2);
      ctx.stroke();
      return;
    }

    if (style === "sticker" && mood.mouth === "smile") {
      ctx.beginPath();
      ctx.ellipse(x, y + r * 0.22, r * 0.13, r * 0.1, 0, 0, Math.PI);
      ctx.fillStyle = "#ff3d57";
      ctx.fill();
      ctx.stroke();
      return;
    }

    if (style === "dramatic" && (mood.mouth === "open" || mood.mouth === "o")) {
      ctx.beginPath();
      ctx.ellipse(x, y + r * 0.26, r * 0.18, r * (0.28 + Math.abs(pulse) * 0.03), 0, 0, Math.PI * 2);
      ctx.fillStyle = "#1c1216";
      ctx.fill();
      ctx.stroke();
      return;
    }

    if (style === "cool" && (mood.mouth === "smile" || mood.mouth === "smirk")) {
      ctx.beginPath();
      ctx.moveTo(x - r * 0.1, y + r * 0.22);
      ctx.quadraticCurveTo(x + r * 0.08, y + r * 0.29, x + r * 0.26, y + r * 0.19);
      ctx.stroke();
      return;
    }

    if (mood.mouth === "smile") {
      ctx.beginPath();
      ctx.moveTo(x - r * 0.21, y + r * 0.22);
      ctx.quadraticCurveTo(x, y + r * (0.36 + wobble), x + r * 0.24, y + r * 0.2);
      ctx.stroke();
      return;
    }

    if (mood.mouth === "open") {
      ctx.beginPath();
      ctx.ellipse(x, y + r * 0.23, r * 0.14, r * (0.2 + wobble), 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      return;
    }

    if (mood.mouth === "smirk") {
      ctx.beginPath();
      ctx.moveTo(x - r * 0.18, y + r * 0.21);
      ctx.quadraticCurveTo(x + r * 0.04, y + r * 0.34, x + r * 0.22, y + r * 0.2);
      ctx.stroke();
      return;
    }

    if (mood.mouth === "question") {
      ctx.beginPath();
      ctx.moveTo(x - r * 0.18, y + r * 0.24);
      ctx.quadraticCurveTo(x, y + r * 0.12, x + r * 0.17, y + r * 0.24);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(x + r * 0.19, y + r * 0.33, r * 0.03, 0, Math.PI * 2);
      ctx.fill();
      return;
    }

    if (mood.mouth === "yawn") {
      ctx.beginPath();
      ctx.ellipse(x, y + r * 0.22, r * 0.15, r * 0.2, 0, 0, Math.PI * 2);
      ctx.fillStyle = "#7d1e1e";
      ctx.fill();
      ctx.stroke();
      return;
    }

    if (mood.mouth === "grit") {
      roundRectPath(x - r * 0.24, y + r * 0.18, r * 0.48, r * 0.16, r * 0.06);
      ctx.fillStyle = "#fff";
      ctx.fill();
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x - r * 0.2, y + r * 0.26);
      ctx.lineTo(x + r * 0.2, y + r * 0.26);
      ctx.stroke();
      return;
    }

    if (mood.mouth === "shout") {
      roundRectPath(x - r * 0.27, y + r * 0.13, r * 0.54, r * 0.26, r * 0.08);
      ctx.fill();
      ctx.stroke();
      ctx.strokeStyle = "rgba(255,255,255,0.9)";
      ctx.lineWidth = Math.max(3, r * 0.024);
      ctx.beginPath();
      ctx.moveTo(x - r * 0.2, y + r * 0.2);
      ctx.lineTo(x + r * 0.2, y + r * 0.18);
      ctx.stroke();
      return;
    }

    if (mood.mouth === "sad") {
      ctx.beginPath();
      ctx.moveTo(x - r * 0.2, y + r * 0.31);
      ctx.quadraticCurveTo(x, y + r * 0.14, x + r * 0.22, y + r * 0.3);
      ctx.stroke();
    }
  }

  function drawCheeks(subject, mood, x, y, r, t) {
    const style = subject.faceStyle || "classic";
    if (mood.mouth === "grit" || mood.mouth === "shout" || mood.mouth === "open") return;
    if (style === "cool") return;
    const alpha = style === "kawaii" || style === "chibi" ? 0.48 + Math.sin(t * 4) * 0.08 : mood.mouth === "sad" ? 0.18 : 0.32 + Math.sin(t * 4) * 0.08;
    const cheekW = r * (style === "kawaii" || style === "chibi" ? 0.14 : 0.1);
    const cheekH = r * (style === "kawaii" || style === "chibi" ? 0.07 : 0.05);
    ctx.fillStyle = `rgba(255, 82, 132, ${alpha})`;
    ctx.beginPath();
    ctx.ellipse(x - r * 0.42, y + r * 0.13, cheekW, cheekH, -0.28, 0, Math.PI * 2);
    ctx.ellipse(x + r * 0.42, y + r * 0.13, cheekW, cheekH, 0.28, 0, Math.PI * 2);
    ctx.fill();
    if (style === "kawaii" || style === "chibi") {
      ctx.strokeStyle = "rgba(255,255,255,0.5)";
      ctx.lineWidth = Math.max(2, r * 0.012);
      ctx.beginPath();
      ctx.moveTo(x - r * 0.46, y + r * 0.1);
      ctx.lineTo(x - r * 0.4, y + r * 0.16);
      ctx.moveTo(x + r * 0.4, y + r * 0.1);
      ctx.lineTo(x + r * 0.46, y + r * 0.16);
      ctx.stroke();
    }
  }

  function drawCoolGlasses(x, y, r, t) {
    const tilt = Math.sin(t * 2) * 0.04;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(tilt);
    ctx.fillStyle = "#111";
    ctx.strokeStyle = "#111";
    ctx.lineWidth = Math.max(5, r * 0.04);
    roundRectPath(-r * 0.43, -r * 0.14, r * 0.34, r * 0.22, r * 0.05);
    ctx.fill();
    roundRectPath(r * 0.09, -r * 0.14, r * 0.34, r * 0.22, r * 0.05);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-r * 0.09, -r * 0.04);
    ctx.lineTo(r * 0.09, -r * 0.04);
    ctx.stroke();
    ctx.strokeStyle = "rgba(255,255,255,0.45)";
    ctx.lineWidth = Math.max(2, r * 0.018);
    ctx.beginPath();
    ctx.moveTo(-r * 0.35, -r * 0.1);
    ctx.lineTo(-r * 0.18, r * 0.02);
    ctx.moveTo(r * 0.17, -r * 0.1);
    ctx.lineTo(r * 0.34, r * 0.02);
    ctx.stroke();
    ctx.restore();
  }

  function drawRoundGlasses(x, y, r, t) {
    const shine = Math.sin(t * 3) * r * 0.012;
    ctx.strokeStyle = "#111";
    ctx.lineWidth = Math.max(4, r * 0.034);
    ctx.fillStyle = "rgba(162, 221, 255, 0.22)";
    ctx.beginPath();
    ctx.ellipse(x - r * 0.23, y, r * 0.18, r * 0.19, 0, 0, Math.PI * 2);
    ctx.ellipse(x + r * 0.23, y, r * 0.18, r * 0.19, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x - r * 0.05, y - r * 0.02);
    ctx.quadraticCurveTo(x, y - r * 0.08, x + r * 0.05, y - r * 0.02);
    ctx.stroke();
    ctx.strokeStyle = "rgba(255,255,255,0.72)";
    ctx.lineWidth = Math.max(2, r * 0.018);
    ctx.beginPath();
    ctx.moveTo(x - r * 0.31, y - r * 0.07 + shine);
    ctx.lineTo(x - r * 0.18, y + r * 0.05 + shine);
    ctx.moveTo(x + r * 0.15, y - r * 0.07 - shine);
    ctx.lineTo(x + r * 0.29, y + r * 0.05 - shine);
    ctx.stroke();
  }

  function drawKawaiiEyes(leftX, rightX, eyeY, eyeW, eyeH, t, r) {
    const glow = Math.sin(t * 4) * r * 0.008;
    ctx.fillStyle = "#fff";
    eyeShape(leftX, eyeY, eyeW * 1.12, eyeH * 1.06 + glow, -0.04);
    eyeShape(rightX, eyeY, eyeW * 1.12, eyeH * 1.06 - glow, 0.04);
    ctx.fillStyle = "#151821";
    ctx.beginPath();
    ctx.ellipse(leftX, eyeY + r * 0.012, eyeW * 0.55, eyeH * 0.62, 0, 0, Math.PI * 2);
    ctx.ellipse(rightX, eyeY + r * 0.012, eyeW * 0.55, eyeH * 0.62, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,0.96)";
    ctx.beginPath();
    ctx.arc(leftX + r * 0.03, eyeY - r * 0.04, r * 0.034, 0, Math.PI * 2);
    ctx.arc(leftX - r * 0.035, eyeY + r * 0.015, r * 0.017, 0, Math.PI * 2);
    ctx.arc(rightX + r * 0.03, eyeY - r * 0.04, r * 0.034, 0, Math.PI * 2);
    ctx.arc(rightX - r * 0.035, eyeY + r * 0.015, r * 0.017, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "#111";
    ctx.lineWidth = Math.max(2, r * 0.018);
    ctx.beginPath();
    ctx.moveTo(leftX - eyeW * 1.1, eyeY - eyeH * 0.12);
    ctx.lineTo(leftX - eyeW * 1.35, eyeY - eyeH * 0.42);
    ctx.moveTo(rightX + eyeW * 1.1, eyeY - eyeH * 0.12);
    ctx.lineTo(rightX + eyeW * 1.35, eyeY - eyeH * 0.42);
    ctx.stroke();
  }

  function drawStickerEyes(leftX, rightX, eyeY, eyeW, eyeH, t, r) {
    const hop = Math.sin(t * 5) * r * 0.018;
    ctx.fillStyle = "#151821";
    ctx.strokeStyle = "#111";
    ctx.lineWidth = Math.max(4, r * 0.034);
    drawStar(leftX, eyeY + hop, r * 0.095, "#ffdd55", true);
    drawStar(rightX, eyeY - hop, r * 0.095, "#ff7aa2", true);
    ctx.fillStyle = "rgba(255,255,255,0.86)";
    ctx.beginPath();
    ctx.arc(leftX + r * 0.025, eyeY - r * 0.025 + hop, r * 0.014, 0, Math.PI * 2);
    ctx.arc(rightX + r * 0.025, eyeY - r * 0.025 - hop, r * 0.014, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawLineStyleMouth(mood, x, y, r, t) {
    const wiggle = Math.sin(t * 6) * r * 0.01;
    ctx.beginPath();
    if (mood.mouth === "sad") {
      ctx.moveTo(x - r * 0.18, y + r * 0.28);
      ctx.quadraticCurveTo(x, y + r * 0.13 + wiggle, x + r * 0.18, y + r * 0.28);
    } else if (mood.mouth === "grit") {
      ctx.moveTo(x - r * 0.18, y + r * 0.24);
      ctx.lineTo(x - r * 0.08, y + r * 0.2);
      ctx.lineTo(x, y + r * 0.27);
      ctx.lineTo(x + r * 0.08, y + r * 0.2);
      ctx.lineTo(x + r * 0.18, y + r * 0.24);
    } else if (mood.mouth === "open" || mood.mouth === "o") {
      ctx.ellipse(x, y + r * 0.23, r * 0.08, r * 0.12, 0, 0, Math.PI * 2);
    } else {
      ctx.moveTo(x - r * 0.18, y + r * 0.2);
      ctx.quadraticCurveTo(x - r * 0.08, y + r * 0.3 + wiggle, x, y + r * 0.22);
      ctx.quadraticCurveTo(x + r * 0.08, y + r * 0.3 - wiggle, x + r * 0.18, y + r * 0.2);
    }
    ctx.stroke();
  }

  function drawFaceAccessories(subject, mood, x, y, r, t, pulse) {
    const style = subject.faceStyle || "classic";
    const bob = Math.sin(t * 5 + subject.phase) * r * 0.025;
    if (style === "sticker" || style === "kawaii" || mood.eye === "spark") {
      drawStar(x + r * 0.55, y - r * 0.2 + bob, r * 0.055, "#ffd447", true);
      drawHeart(x - r * 0.56, y - r * 0.15 - bob, r * 0.05, "#ff6b8f");
    }
    if (style === "dramatic" || mood.mouth === "shout" || mood.brow === "rage") {
      ctx.strokeStyle = "#ff3b30";
      ctx.lineWidth = Math.max(3, r * 0.026);
      ctx.beginPath();
      ctx.moveTo(x + r * 0.45, y - r * 0.42 + bob);
      ctx.lineTo(x + r * 0.5, y - r * 0.56 + bob);
      ctx.lineTo(x + r * 0.57, y - r * 0.45 + bob);
      ctx.moveTo(x + r * 0.61, y - r * 0.55 - bob);
      ctx.lineTo(x + r * 0.64, y - r * 0.39 - bob);
      ctx.stroke();
    }
    if (style === "chibi") {
      ctx.strokeStyle = "#111";
      ctx.lineWidth = Math.max(3, r * 0.025);
      ctx.beginPath();
      ctx.moveTo(x - r * 0.12, y - r * 0.63 + bob);
      ctx.quadraticCurveTo(x, y - r * 0.77 + bob, x + r * 0.08, y - r * 0.63 + bob);
      ctx.stroke();
      ctx.fillStyle = "#8bedb5";
      ctx.beginPath();
      ctx.ellipse(x + r * 0.17, y - r * 0.69 + bob, r * 0.07, r * 0.034, -0.35, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
    }
    if (style === "cool") {
      ctx.strokeStyle = "#111";
      ctx.lineWidth = Math.max(3, r * 0.024);
      ctx.beginPath();
      ctx.moveTo(x - r * 0.16, y + r * 0.35);
      ctx.quadraticCurveTo(x - r * 0.08, y + r * 0.41, x, y + r * 0.35);
      ctx.quadraticCurveTo(x + r * 0.08, y + r * 0.41, x + r * 0.16, y + r * 0.35);
      ctx.stroke();
    }
  }

  function drawHeart(x, y, size, color) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(size / 24, size / 24);
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(0, 8);
    ctx.bezierCurveTo(-14, -2, -10, -15, 0, -8);
    ctx.bezierCurveTo(10, -15, 14, -2, 0, 8);
    ctx.fill();
    ctx.restore();
  }

  function drawStar(x, y, size, color, outlined = false) {
    ctx.save();
    ctx.translate(x, y);
    ctx.beginPath();
    for (let i = 0; i < 10; i++) {
      const a = -Math.PI / 2 + i * Math.PI / 5;
      const rr = i % 2 === 0 ? size : size * 0.46;
      const px = Math.cos(a) * rr;
      const py = Math.sin(a) * rr;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
    if (outlined) {
      ctx.strokeStyle = "#111";
      ctx.lineWidth = Math.max(2, size * 0.16);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawSparkMarks(subject, mood, x, y, r, t) {
    if (mood.eye !== "spark" && mood.brow !== "rage" && mood.eye !== "cross") return;
    ctx.strokeStyle = mood.brow === "rage" ? "#ff3b30" : "#fff";
    ctx.lineWidth = Math.max(3, r * 0.026);
    const jitter = Math.sin(t * 18 + subject.phase) * r * 0.025;
    ctx.beginPath();
    if (mood.brow === "rage") {
      ctx.moveTo(x + r * 0.48, y - r * 0.18 + jitter);
      ctx.lineTo(x + r * 0.62, y - r * 0.28);
      ctx.moveTo(x + r * 0.52, y - r * 0.04 - jitter);
      ctx.lineTo(x + r * 0.68, y - r * 0.08);
      ctx.moveTo(x - r * 0.48, y - r * 0.18 - jitter);
      ctx.lineTo(x - r * 0.62, y - r * 0.28);
    } else {
      ctx.moveTo(x + r * 0.52, y - r * 0.18);
      ctx.lineTo(x + r * 0.62, y - r * 0.31);
      ctx.moveTo(x + r * 0.56, y - r * 0.03);
      ctx.lineTo(x + r * 0.7, y - r * 0.04);
    }
    ctx.stroke();
  }

  function drawArms(subject, mood, x, y, r, t, pulse, quick) {
    ctx.strokeStyle = mood.arm === "hug" ? "#fff" : "#111";
    ctx.lineWidth = Math.max(11, r * 0.085);
    const wobble = Math.sin(t * 4 + subject.phase) * r * 0.08;
    const shake = quick * r * 0.08;
    const leftShoulder = { x: x - r * 0.44, y: y + r * 0.02 };
    const rightShoulder = { x: x + r * 0.44, y: y + r * 0.02 };

    ctx.beginPath();
    if (mood.arm === "wave") {
      ctx.moveTo(leftShoulder.x, leftShoulder.y);
      ctx.quadraticCurveTo(x - r * 0.9, y - r * 0.22 + wobble, x - r * 0.72, y - r * 0.78 + wobble);
      ctx.moveTo(rightShoulder.x, rightShoulder.y);
      ctx.quadraticCurveTo(x + r * 0.76, y + r * 0.16 - wobble, x + r * 0.9, y - r * 0.2);
    } else if (mood.arm === "up") {
      ctx.moveTo(leftShoulder.x, leftShoulder.y);
      ctx.quadraticCurveTo(x - r * 0.78, y - r * 0.45, x - r * 0.58, y - r * 0.96 - wobble);
      ctx.moveTo(rightShoulder.x, rightShoulder.y);
      ctx.quadraticCurveTo(x + r * 0.78, y - r * 0.45, x + r * 0.58, y - r * 0.96 + wobble);
    } else if (mood.arm === "point") {
      ctx.moveTo(leftShoulder.x, leftShoulder.y);
      ctx.lineTo(x - r * 1.04, y - r * 0.44 + wobble);
      ctx.moveTo(rightShoulder.x, rightShoulder.y);
      ctx.lineTo(x + r * 1.12, y - r * 0.18 - wobble);
    } else if (mood.arm === "shake") {
      ctx.moveTo(leftShoulder.x, leftShoulder.y);
      ctx.lineTo(x - r * 0.98 + shake, y - r * 0.48);
      ctx.moveTo(rightShoulder.x, rightShoulder.y);
      ctx.lineTo(x + r * 0.98 - shake, y - r * 0.48);
    } else if (mood.arm === "hug") {
      ctx.moveTo(leftShoulder.x, leftShoulder.y);
      ctx.quadraticCurveTo(x - r * 0.38, y + r * 0.42 + pulse * r * 0.04, x - r * 0.06, y + r * 0.35);
      ctx.moveTo(rightShoulder.x, rightShoulder.y);
      ctx.quadraticCurveTo(x + r * 0.38, y + r * 0.42 - pulse * r * 0.04, x + r * 0.06, y + r * 0.35);
    } else if (mood.arm === "spread") {
      ctx.moveTo(leftShoulder.x, leftShoulder.y);
      ctx.quadraticCurveTo(x - r * 0.9, y - r * 0.38, x - r * 1.05, y + r * 0.03);
      ctx.moveTo(rightShoulder.x, rightShoulder.y);
      ctx.quadraticCurveTo(x + r * 0.9, y - r * 0.38, x + r * 1.05, y + r * 0.03);
    }
    ctx.stroke();

    drawHandDots(mood, x, y, r, wobble, shake);
  }

  function drawHandDots(mood, x, y, r, wobble, shake) {
    ctx.fillStyle = mood.arm === "hug" ? "#fff" : "#111";
    const handR = Math.max(8, r * 0.07);
    let points;
    if (mood.arm === "wave") {
      points = [[x - r * 0.72, y - r * 0.78 + wobble], [x + r * 0.9, y - r * 0.2]];
    } else if (mood.arm === "up") {
      points = [[x - r * 0.58, y - r * 0.96 - wobble], [x + r * 0.58, y - r * 0.96 + wobble]];
    } else if (mood.arm === "point") {
      points = [[x - r * 1.04, y - r * 0.44 + wobble], [x + r * 1.12, y - r * 0.18 - wobble]];
    } else if (mood.arm === "shake") {
      points = [[x - r * 0.98 + shake, y - r * 0.48], [x + r * 0.98 - shake, y - r * 0.48]];
    } else if (mood.arm === "spread") {
      points = [[x - r * 1.05, y + r * 0.03], [x + r * 1.05, y + r * 0.03]];
    } else {
      points = [[x - r * 0.06, y + r * 0.35], [x + r * 0.06, y + r * 0.35]];
    }
    for (const [px, py] of points) {
      ctx.beginPath();
      ctx.arc(px, py, handR, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawLegs(subject, mood, x, y, r, t, pulse, quick) {
    const mode = subject.legMode || "stand";
    const hipY = y + r * 0.62;
    const hipSpread = r * 0.18;
    const legLen = r * 0.92;
    const footR = Math.max(6, r * 0.05);
    const swing = {
      stand: 0.03,
      walk: 0.38,
      run: 0.56,
      jump: 0.12
    }[mode] || 0.03;
    const bounce = {
      stand: 0.02,
      walk: 0.05,
      run: 0.09,
      jump: 0.22
    }[mode] || 0.03;
    const baseLift = mode === "jump" ? -r * 0.16 : 0;
    const leftPhase = Math.sin(t * (mode === "run" ? 7.2 : 4.8) + subject.phase);
    const rightPhase = Math.sin(t * (mode === "run" ? 7.2 : 4.8) + subject.phase + Math.PI);
    const leftForward = leftPhase * swing * r;
    const rightForward = rightPhase * swing * r;
    const sway = Math.sin(t * 2.5 + subject.phase) * r * 0.02;

    ctx.strokeStyle = "#111";
    ctx.lineWidth = Math.max(10, r * 0.08);

    function legPath(side, forward, phaseLift, bendExtra) {
      const sx = x + side * hipSpread;
      const sy = hipY + baseLift + pulse * r * bounce;
      const kneeX = sx + side * forward * 0.42;
      const kneeY = sy + legLen * 0.42 - phaseLift;
      const footX = sx + side * forward * 0.8 + bendExtra;
      const footY = sy + legLen * 0.98 - phaseLift;
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.quadraticCurveTo(kneeX, kneeY, footX, footY);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(footX, footY, footR, 0, Math.PI * 2);
      ctx.fillStyle = "#111";
      ctx.fill();
    }

    if (mode === "stand") {
      legPath(-1, sway * 0.2, 0, 0);
      legPath(1, -sway * 0.2, 0, 0);
    } else if (mode === "walk") {
      legPath(-1, leftForward, Math.max(0, -leftPhase) * r * 0.06, 0);
      legPath(1, rightForward, Math.max(0, -rightPhase) * r * 0.06, 0);
    } else if (mode === "run") {
      legPath(-1, leftForward * 1.2, Math.max(0, -leftPhase) * r * 0.1, -r * 0.02);
      legPath(1, rightForward * 1.2, Math.max(0, -rightPhase) * r * 0.1, r * 0.02);
    } else if (mode === "jump") {
      const lift = Math.max(0, Math.sin(t * 4 + subject.phase)) * r * 0.2;
      legPath(-1, -swing * r * 0.25, lift * 0.7, -r * 0.03);
      legPath(1, swing * r * 0.25, lift * 0.7, r * 0.03);
    }
  }

  function drawBubble(subject, mood, x, y, r, text) {
    if (!text) return;
    ctx.save();
    ctx.textBaseline = "middle";
    ctx.textAlign = "center";

    const maxBubbleW = Math.min(CANVAS_W - 44, Math.max(230, r * 2.35 * subject.bubbleScale));
    const maxBubbleH = Math.min(240, Math.max(96, r * 1.55));
    const padX = 24;
    const padY = 16;
    const layout = fitBubbleText(text, maxBubbleW - padX * 2, maxBubbleH - padY * 2, subject.textScale);
    const textW = Math.max(...layout.lines.map(line => ctx.measureText(line).width));
    const bubbleW = Math.min(maxBubbleW, Math.max(170, textW + padX * 2));
    const bubbleH = Math.min(maxBubbleH, Math.max(66, layout.lines.length * layout.lineH + padY * 2));
    const side = x < CANVAS_W * 0.58 ? 1 : -1;
    let bx = x + side * r * 0.92;
    let by = y - r * 1.22;
    bx = Math.max(18 + bubbleW / 2, Math.min(CANVAS_W - 18 - bubbleW / 2, bx));
    by = Math.max(72 + bubbleH / 2, Math.min(CANVAS_H - 20 - bubbleH / 2, by));

    ctx.shadowColor = "rgba(0,0,0,0.18)";
    ctx.shadowBlur = 18;
    ctx.shadowOffsetY = 8;
    ctx.fillStyle = mood.bubble;
    ctx.strokeStyle = "rgba(25,25,28,0.92)";
    ctx.lineWidth = 4;
    drawBubbleShape(subject.bubbleStyle, bx, by, bubbleW, bubbleH, x, y, side, r);

    ctx.shadowColor = "transparent";
    ctx.save();
    ctx.beginPath();
    ctx.rect(bx - bubbleW / 2 + padX * 0.62, by - bubbleH / 2 + padY * 0.72, bubbleW - padX * 1.24, bubbleH - padY * 1.44);
    ctx.clip();
    ctx.font = `${layout.fontSize}px "PingFang SC", "Microsoft YaHei", sans-serif`;
    ctx.fillStyle = "#171717";
    layout.lines.forEach((line, index) => {
      const ly = by - (layout.lines.length - 1) * layout.lineH / 2 + index * layout.lineH;
      ctx.fillText(line, bx, ly);
    });
    ctx.restore();
    ctx.restore();
  }

  function fitBubbleText(text, maxWidth, maxHeight, desiredFont) {
    let fontSize = Math.max(12, Math.min(42, desiredFont));

    while (fontSize >= 12) {
      ctx.font = `${fontSize}px "PingFang SC", "Microsoft YaHei", sans-serif`;
      const lines = wrapText(text, maxWidth);
      const lineH = Math.max(20, fontSize * 1.26);
      if (lines.length <= 4 && lines.length * lineH <= maxHeight) {
        return { fontSize, lines, lineH };
      }
      fontSize -= 1;
    }

    ctx.font = `12px "PingFang SC", "Microsoft YaHei", sans-serif`;
    const lines = wrapText(text, maxWidth).slice(0, 4);
    if (lines.length === 4) lines[3] = trimTextToWidth(lines[3], maxWidth);
    return { fontSize: 12, lines, lineH: 20 };
  }

  function trimTextToWidth(text, maxWidth) {
    let result = text;
    while (result.length > 1 && ctx.measureText(`${result}…`).width > maxWidth) {
      result = result.slice(0, -1);
    }
    return `${result}…`;
  }

  function drawBubbleShape(style, bx, by, bubbleW, bubbleH, x, y, side, r) {
    const tailX = Math.max(bx - bubbleW / 2 + 28, Math.min(bx + bubbleW / 2 - 28, x + side * r * 0.36));
    const left = bx - bubbleW / 2;
    const top = by - bubbleH / 2;
    const right = bx + bubbleW / 2;
    const bottom = by + bubbleH / 2;

    if (style === "cloud") {
      ctx.beginPath();
      ctx.arc(left + bubbleW * 0.22, by, bubbleH * 0.22, Math.PI * 0.5, Math.PI * 1.5);
      ctx.arc(bx, top + bubbleH * 0.22, bubbleW * 0.18, Math.PI, 0);
      ctx.arc(right - bubbleW * 0.18, by, bubbleH * 0.22, Math.PI * 1.5, Math.PI * 0.5);
      ctx.arc(bx, bottom - bubbleH * 0.22, bubbleW * 0.18, 0, Math.PI);
      ctx.closePath();
    } else if (style === "sharp") {
      ctx.beginPath();
      const spikes = 7;
      for (let i = 0; i < spikes; i++) {
        const px = left + (bubbleW / spikes) * i;
        const py = i % 2 === 0 ? top - 8 : top + 4;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.lineTo(right, top + bubbleH * 0.18);
      ctx.lineTo(right + 10, by);
      ctx.lineTo(right - bubbleW * 0.05, bottom - 4);
      for (let i = spikes - 1; i >= 0; i--) {
        const px = left + (bubbleW / spikes) * i;
        const py = i % 2 === 0 ? bottom + 8 : bottom - 4;
        ctx.lineTo(px, py);
      }
      ctx.closePath();
    } else if (style === "note") {
      roundRectPath(left, top, bubbleW, bubbleH, 16);
      ctx.moveTo(right - 34, top);
      ctx.lineTo(right, top + 28);
      ctx.lineTo(right - 10, top + 28);
      ctx.lineTo(right - 34, top);
      ctx.closePath();
    } else if (style === "pill") {
      roundRectPath(left, top, bubbleW, bubbleH, bubbleH / 2);
    } else {
      roundRectPath(left, top, bubbleW, bubbleH, 18);
    }

    ctx.fill();
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(tailX, bottom - 2);
    ctx.lineTo(tailX + side * 18, bottom + 24);
    ctx.lineTo(tailX - side * 28, bottom - 2);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  }

  function wrapText(text, maxWidth) {
    const lines = [];
    for (const para of String(text).split(/\n+/)) {
      const chars = Array.from(para);
      let line = "";
      for (const ch of chars) {
        const next = line + ch;
        if (ctx.measureText(next).width > maxWidth && line) {
          lines.push(line);
          line = ch;
        } else {
          line = next;
        }
      }
      if (line) lines.push(line);
    }
    return lines.slice(0, 4);
  }

  function roundRectPath(x, y, w, h, r) {
    const rr = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + rr, y);
    ctx.arcTo(x + w, y, x + w, y + h, rr);
    ctx.arcTo(x + w, y + h, x, y + h, rr);
    ctx.arcTo(x, y + h, x, y, rr);
    ctx.arcTo(x, y, x + w, y, rr);
    ctx.closePath();
  }

  function canvasPointFromEvent(event) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (event.clientX - rect.left) / rect.width * CANVAS_W,
      y: (event.clientY - rect.top) / rect.height * CANVAS_H
    };
  }

  function subjectAtPoint(point) {
    return [...state.subjects]
      .sort((a, b) => b.y - a.y)
      .find(subject => Math.hypot(point.x - subject.x, point.y - subject.y) < subject.bodySize * 1.15);
  }

  function beginDrag(event) {
    if (!state.source) return;
    const point = canvasPointFromEvent(event);
    let subject = subjectAtPoint(point);
    if (!subject) {
      subject = addSubject({
        x: clamp(point.x, 60, CANVAS_W - 60),
        y: clamp(point.y, 70, CANVAS_H - 70)
      }, true);
      showToast("已新增一个主体");
    } else {
      selectSubject(subject.id);
    }
    state.draggingId = subject.id;
    state.dragOffsetX = point.x - subject.x;
    state.dragOffsetY = point.y - subject.y;
    event.preventDefault();
  }

  function moveDrag(event) {
    if (!state.draggingId) return;
    const subject = state.subjects.find(item => item.id === state.draggingId);
    if (!subject) return;
    const point = canvasPointFromEvent(event);
    subject.x = clamp(point.x - state.dragOffsetX, 40, CANVAS_W - 40);
    subject.y = clamp(point.y - state.dragOffsetY, 40, CANVAS_H - 40);
    event.preventDefault();
  }

  function endDrag() {
    state.draggingId = null;
  }

  async function loadFile(file) {
    if (!file) return;
    if (!file.type.startsWith("image/") && !file.type.startsWith("video/")) {
      showToast("请选择图片或视频素材。");
      return;
    }
    await ensureAudio(false);
    if (state.objectUrl) URL.revokeObjectURL(state.objectUrl);
    state.objectUrl = URL.createObjectURL(file);
    state.sourceType = file.type.startsWith("video/") ? "video" : "image";
    state.subjects = [createSubject({ x: CANVAS_W * 0.5, y: CANVAS_H * 0.56 })];
    state.selectedId = state.subjects[0].id;
    emptyState.classList.add("hidden");
    exportBtn.disabled = true;
    refreshControls();
    setStatus("素材加载中");

    if (state.sourceType === "video") {
      await loadVideo(state.objectUrl);
      state.source = sourceVideo;
      setStatus("正在推荐主角");
      detectSelectedSubject(true);
      sourceVideo.play().catch(() => {});
    } else {
      state.source = await loadImage(state.objectUrl);
      setStatus("正在推荐主角");
      detectSelectedSubject(true);
    }

    exportBtn.disabled = false;
    refreshControls();
    // Auto-expand sheet when media loaded
    const sheet = document.querySelector('.control-sheet');
    if (sheet) sheet.classList.remove('collapsed');
    setStatus(state.sourceType === "video" ? "已导入视频" : "已导入图片");
    showToast("上下拖拽面板查看更多选项，点击空白处新增主体。");
  }

  function loadImage(url) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = reject;
      img.src = url;
    });
  }

  function loadVideo(url) {
    return new Promise((resolve, reject) => {
      sourceVideo.pause();
      sourceVideo.src = url;
      sourceVideo.currentTime = 0;
      sourceVideo.onloadeddata = () => resolve();
      sourceVideo.onerror = reject;
      sourceVideo.load();
    });
  }

  function chooseMime() {
    const candidates = [
      "video/mp4;codecs=avc1.42E01E",
      "video/mp4",
      "video/webm;codecs=vp9",
      "video/webm;codecs=vp8",
      "video/webm"
    ];
    if (!window.MediaRecorder) return "";
    return candidates.find(type => MediaRecorder.isTypeSupported(type)) || "";
  }

  function createRecorder(stream) {
    const candidates = [
      "video/mp4;codecs=avc1.42E01E",
      "video/mp4",
      "video/webm;codecs=vp9",
      "video/webm;codecs=vp8",
      "video/webm"
    ];
    if (!window.MediaRecorder) return null;
    for (const mimeType of candidates) {
      if (!MediaRecorder.isTypeSupported(mimeType)) continue;
      try {
        return { recorder: new MediaRecorder(stream, { mimeType }), mimeType };
      } catch (err) {
        console.warn("MediaRecorder mime failed", mimeType, err);
      }
    }
    try {
      return { recorder: new MediaRecorder(stream), mimeType: "" };
    } catch (err) {
      console.warn("MediaRecorder default failed", err);
      return null;
    }
  }

  function waitForSeek(video) {
    return new Promise(resolve => {
      let finished = false;
      const done = () => {
        if (finished) return;
        finished = true;
        video.removeEventListener("seeked", done);
        resolve();
      };
      video.addEventListener("seeked", done, { once: true });
      requestAnimationFrame(() => {
        if (!finished && Math.abs(video.currentTime - 0) < 0.01) done();
      });
    });
  }

  async function exportVideo() {
    if (!state.source || state.exporting) return;
    if (!canvas.captureStream || !window.MediaRecorder) {
      showToast("当前浏览器不支持导出，请换 Chrome 或新版 Safari。");
      return;
    }

    state.exporting = true;
    exportBtn.disabled = true;
    pickBtn.disabled = true;
    setStatus("正在导出视频…");

    const chunks = [];
    const videoStream = canvas.captureStream(30);

    // Audio is optional — include if available, skip otherwise
    let combinedStream = videoStream;
    let hasAudio = false;
    try {
      await ensureAudio(false);
      const audioTracks = audioDestination?.stream?.getAudioTracks?.() || [];
      if (audioTracks.length > 0) {
        combinedStream = new MediaStream([
          ...videoStream.getVideoTracks(),
          ...audioTracks
        ]);
        hasAudio = true;
      }
    } catch (e) { /* audio unavailable, export video only */ }

    const recorderInfo = createRecorder(combinedStream);
    if (!recorderInfo) {
      showToast("当前浏览器没有可用的视频编码器。");
      state.exporting = false;
      exportBtn.disabled = false;
      pickBtn.disabled = false;
      return;
    }
    const { recorder, mimeType } = recorderInfo;
    recorder.ondataavailable = event => {
      if (event.data && event.data.size > 0) chunks.push(event.data);
    };

    const stopped = new Promise(resolve => {
      recorder.onstop = () => resolve();
    });

    let restoreTime = 0;
    let stopTimer;

    try {
      if (state.sourceType === "video") {
        restoreTime = sourceVideo.currentTime || 0;
        sourceVideo.loop = false;
        sourceVideo.pause();
        sourceVideo.currentTime = 0;
        await waitForSeek(sourceVideo);
        recorder.start(250);
        if (hasAudio) {
          state.recordingAudio = true;
          for (const subject of state.subjects) {
            resetDialogueVoiceState(subject);
            subject.dialogueStartedAt = performance.now();
          }
        }
        await sourceVideo.play();
        const stopAt = Math.min((sourceVideo.duration || EXPORT_MAX_SECONDS) * 1000, EXPORT_MAX_SECONDS * 1000);
        stopTimer = setTimeout(() => {
          if (recorder.state !== "inactive") recorder.stop();
        }, stopAt);
        sourceVideo.addEventListener("ended", () => {
          if (recorder.state !== "inactive") recorder.stop();
        }, { once: true });
      } else {
        recorder.start(250);
        if (hasAudio) {
          state.recordingAudio = true;
          for (const subject of state.subjects) {
            resetDialogueVoiceState(subject);
            subject.dialogueStartedAt = performance.now();
          }
        }
        stopTimer = setTimeout(() => {
          if (recorder.state !== "inactive") recorder.stop();
        }, EXPORT_IMAGE_SECONDS * 1000);
      }

      await stopped;
      clearTimeout(stopTimer);
      const blob = new Blob(chunks, { type: mimeType || "video/webm" });
      if (state.captureUrl) URL.revokeObjectURL(state.captureUrl);
      state.captureUrl = URL.createObjectURL(blob);
      const ext = (mimeType || "").includes("mp4") ? "mp4" : "webm";
      const fileName = `emotion-character-${Date.now()}.${ext}`;
      try {
        const a = document.createElement("a");
        a.href = state.captureUrl;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        a.remove();
      } catch (e) {
        window.open(state.captureUrl, "_blank");
      }
      const audioNote = hasAudio ? "" : "（无声）";
      setStatus("导出完成");
      showToast(`✅ 已导出 ${ext.toUpperCase()} 视频${audioNote}，请检查下载列表。`);
    } catch (err) {
      console.error(err);
      showToast("导出失败，换一个更短的视频试试。");
      setStatus("导出失败");
    } finally {
      state.recordingAudio = false;
      if (state.sourceType === "video") {
        sourceVideo.loop = true;
        sourceVideo.currentTime = Math.min(restoreTime, sourceVideo.duration || restoreTime);
        sourceVideo.play().catch(() => {});
      }
      videoStream.getTracks().forEach(track => track.stop());
      state.exporting = false;
      exportBtn.disabled = false;
      pickBtn.disabled = false;
    }
  }

  pickBtn.addEventListener("click", () => fileInput.click());
  fileInput.addEventListener("change", event => loadFile(event.target.files[0]));
  exportBtn.addEventListener("click", exportVideo);
  addSubjectBtn.addEventListener("click", () => {
    if (!state.source) {
      showToast("先导入图片或视频，再添加主体。");
      return;
    }
    addSubject({
      x: CANVAS_W * 0.5 + Math.min(120, state.subjects.length * 36),
      y: CANVAS_H * 0.56 + Math.min(120, state.subjects.length * 24)
    }, true);
    showToast("已新增一个主体");
  });
  duplicateSubjectBtn.addEventListener("click", duplicateSelectedSubject);
  deleteSubjectBtn.addEventListener("click", removeSelectedSubject);

  shuffleBtn.addEventListener("click", () => {
    const subject = selectedSubject();
    if (!subject) return;
    const lines = emotions[subject.emotion].phrases.slice();
    while (lines.length < 5) lines.push(pickPhrase(subject.emotion));
    subject.dialogueText = lines.slice(0, 5).join("\n");
    subject.dialogueLines = normalizeDialogueLines(subject.dialogueText, subject.emotion, subject.persona);
    subject.lineEmotions = subject.dialogueLines.map(() => subject.emotion);
    resetDialogueVoiceState(subject);
    subject.dialogueStartedAt = performance.now();
    captionInput.value = subject.dialogueText;
    buildLineEmotionPanel();
  });
  autoGenBtn.addEventListener("click", () => {
    const subject = selectedSubject();
    if (!subject) return;
    subject.persona = personaInput.value.trim();
    const lines = generateDialogueLines(subject.persona, subject.emotion);
    subject.dialogueText = lines.join("\n");
    subject.dialogueLines = lines;
    subject.lineEmotions = lines.map(() => subject.emotion);
    resetDialogueVoiceState(subject);
    subject.dialogueStartedAt = performance.now();
    captionInput.value = subject.dialogueText;
    buildLineEmotionPanel();
    showToast("已按想法和特点生成多句台词");
  });
  captionInput.addEventListener("input", () => {
    const subject = selectedSubject();
    if (!subject) return;
    subject.dialogueText = captionInput.value;
    subject.dialogueLines = normalizeDialogueLines(subject.dialogueText, subject.emotion, subject.persona);
    syncLineEmotions(subject, subject.dialogueLines, subject.emotion);
    resetDialogueVoiceState(subject);
    subject.dialogueStartedAt = performance.now();
    buildLineEmotionPanel();
  });
  personaInput.addEventListener("input", () => {
    const subject = selectedSubject();
    if (!subject) return;
    subject.persona = personaInput.value;
  });
  detectBtn.addEventListener("click", () => {
    detectSelectedSubject(true);
    refreshControls();
    showToast("已重新推荐当前主体位置");
  });
  centerBtn.addEventListener("click", () => {
    const subject = selectedSubject();
    if (!subject) return;
    subject.x = CANVAS_W * 0.5;
    subject.y = CANVAS_H * 0.54;
    refreshControls();
  });
  bodySlider.addEventListener("input", () => {
    const subject = selectedSubject();
    if (!subject) return;
    subject.bodySize = Number(bodySlider.value);
  });
  faceSlider.addEventListener("input", () => {
    const subject = selectedSubject();
    if (!subject) return;
    subject.faceScale = Number(faceSlider.value) / 100;
  });
  textSlider.addEventListener("input", () => {
    const subject = selectedSubject();
    if (!subject) return;
    subject.textScale = Number(textSlider.value);
  });
  speedSlider.addEventListener("input", () => {
    const subject = selectedSubject();
    if (!subject) return;
    subject.lineSpeed = Number(speedSlider.value);
    resetDialogueVoiceState(subject);
    subject.dialogueStartedAt = performance.now();
  });
  voiceVolumeSlider.addEventListener("input", () => {
    const subject = selectedSubject();
    if (!subject) return;
    subject.voiceVolume = Number(voiceVolumeSlider.value) / 100;
  });
  voiceToggle.addEventListener("change", () => {
    const subject = selectedSubject();
    if (!subject) return;
    subject.voiceEnabled = voiceToggle.checked;
  });
  previewVoiceBtn.addEventListener("click", previewSubjectVoice);
  followToggle.addEventListener("change", () => {
    const subject = selectedSubject();
    if (!subject) return;
    subject.autoTrack = followToggle.checked;
  });
  bodyToggle.addEventListener("change", () => {
    const subject = selectedSubject();
    if (!subject) return;
    subject.showBody = bodyToggle.checked;
  });
  faceToggle.addEventListener("change", () => {
    const subject = selectedSubject();
    if (!subject) return;
    subject.showFace = faceToggle.checked;
  });
  legToggle.addEventListener("change", () => {
    const subject = selectedSubject();
    if (!subject) return;
    subject.showLegs = legToggle.checked;
  });
  textToggle.addEventListener("change", () => {
    const subject = selectedSubject();
    if (!subject) return;
    subject.showText = textToggle.checked;
  });

  stage.addEventListener("dragover", event => event.preventDefault());
  stage.addEventListener("drop", event => {
    event.preventDefault();
    loadFile(event.dataTransfer.files[0]);
  });

  canvas.addEventListener("pointerdown", beginDrag);
  window.addEventListener("pointermove", moveDrag);
  window.addEventListener("pointerup", endDrag);
  initPanelResize();
  refreshControls();
  requestAnimationFrame(render);

  // iOS-style Sheet Drag to Expand/Collapse
  const controlSheet = document.querySelector('.control-sheet');
  const sheetHandleWrap = document.getElementById('sheetHandleWrap');
  let sheetDragActive = false;
  let sheetDragStartY = 0;
  let sheetDragMoved = false;

  function toggleSheet() {
    if (!controlSheet) return;
    controlSheet.classList.toggle('collapsed');
    if (!controlSheet.classList.contains('collapsed')) {
      controlSheet.scrollTop = 0;
    }
  }

  if (sheetHandleWrap && controlSheet) {
    sheetHandleWrap.addEventListener('pointerdown', (e) => {
      sheetDragActive = true;
      sheetDragMoved = false;
      sheetDragStartY = e.clientY;
      sheetHandleWrap.setPointerCapture(e.pointerId);
      e.preventDefault();
    });

    sheetHandleWrap.addEventListener('pointermove', (e) => {
      if (!sheetDragActive) return;
      const dy = sheetDragStartY - e.clientY; // + = dragging up
      if (Math.abs(dy) > 30) {
        sheetDragMoved = true;
        const isCollapsed = controlSheet.classList.contains('collapsed');
        if (dy > 30 && isCollapsed) {
          controlSheet.classList.remove('collapsed');
          controlSheet.scrollTop = 0;
          sheetDragActive = false;
        } else if (dy < -30 && !isCollapsed) {
          controlSheet.classList.add('collapsed');
          sheetDragActive = false;
        }
      }
    });

    sheetHandleWrap.addEventListener('pointerup', () => {
      sheetDragActive = false;
    });

    sheetHandleWrap.addEventListener('pointercancel', () => {
      sheetDragActive = false;
    });

    // Tap to toggle
    sheetHandleWrap.addEventListener('click', (e) => {
      if (!sheetDragMoved) {
        toggleSheet();
      }
    });
  }

  // iOS-style Tab Switching
  const sheetTabs = document.querySelectorAll('.sheet-tab');
  const sheetPanels = document.querySelectorAll('.sheet-panel');
  sheetTabs.forEach(tab => {
    tab.addEventListener('click', () => {
      const target = tab.dataset.tab;
      sheetTabs.forEach(t => t.classList.toggle('active', t.dataset.tab === target));
      sheetPanels.forEach(p => p.classList.toggle('active', p.dataset.panel === target));
      // Auto-expand sheet when switching tabs
      if (controlSheet && controlSheet.classList.contains('collapsed')) {
        controlSheet.classList.remove('collapsed');
      }
    });
  });

  // Register Service Worker for PWA
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./service-worker.js').catch(() => {});
  }
})();
</script>
</body>
</html>
