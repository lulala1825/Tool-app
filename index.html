<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<title>情绪拟人短视频</title>
<style>
:root {
  color-scheme: dark;
  --bg: #000000;
  --surface: rgba(28,28,30,0.82);
  --surface-solid: #1c1c1e;
  --elevated: #2c2c2e;
  --border: rgba(255,255,255,0.1);
  --text: #ffffff;
  --text-secondary: rgba(255,255,255,0.6);
  --text-tertiary: rgba(255,255,255,0.3);
  --primary: #0a84ff;
  --success: #30d158;
  --warning: #ff9f0a;
  --danger: #ff453a;
  --ink: #19191c;
  --mint: #38d5a3;
  --coral: #ff6b6b;
  --sun: #ffd166;
  --sky: #6ec8ff;
  --violet: #b89cff;
}
* { box-sizing: border-box; }
html, body {
  width: 100%; height: 100%; margin: 0;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
}
button, input, select, textarea { font: inherit; }
button { border: 0; color: inherit; background: none; }

.app {
  min-height: 100dvh;
  display: grid;
  grid-template-rows: minmax(0, 1fr) auto;
  background: var(--bg);
}

/* iOS Navigation Bar */
.nav-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding-top: env(safe-area-inset-top);
  height: calc(44px + env(safe-area-inset-top));
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 0.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
}
.nav-content {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 16px;
}
.brand {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 800;
  font-size: 17px;
  letter-spacing: -0.01em;
}
.brand-mark {
  width: 24px; height: 24px;
  border-radius: 7px;
  background:
    radial-gradient(circle at 38% 36%, #fff 0 13%, transparent 14%),
    radial-gradient(circle at 64% 36%, #fff 0 13%, transparent 14%),
    linear-gradient(135deg, var(--sun), var(--coral) 48%, var(--mint));
  box-shadow: inset 0 -8px 10px rgba(0,0,0,0.16);
}
.status-pill {
  max-width: 180px;
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Stage */
.stage-wrap {
  min-height: 0;
  display: grid;
  place-items: center;
  padding: calc(max(62px, env(safe-area-inset-top) + 44px)) 16px calc(12px + env(safe-area-inset-bottom));
}
.stage {
  position: relative;
  width: min(100vw - 32px, calc((100dvh - 280px) * 9 / 16), 400px);
  aspect-ratio: 9 / 16;
  max-height: calc(100dvh - 270px);
  overflow: hidden;
  border-radius: 20px;
  background:
    linear-gradient(135deg, rgba(255,255,255,0.06), transparent),
    #1c1c1e;
  box-shadow:
    0 24px 60px rgba(0,0,0,0.45),
    0 0 0 1px rgba(255,255,255,0.08);
  touch-action: none;
}
canvas { display: block; width: 100%; height: 100%; }

.empty-state {
  position: absolute; inset: 0;
  display: grid; place-items: center;
  padding: 26px; text-align: center;
  color: rgba(255,255,255,0.78);
  pointer-events: none;
}
.empty-state.hidden { display: none; }
.empty-card { display: grid; gap: 14px; justify-items: center; }
.empty-face {
  width: 88px; height: 88px;
  border-radius: 50%;
  background: linear-gradient(145deg, #ffd166, #ff8a5b);
  position: relative;
  box-shadow: 0 14px 28px rgba(0,0,0,0.25);
}
.empty-face::before, .empty-face::after {
  content: ""; position: absolute; top: 30px;
  width: 16px; height: 20px; border-radius: 50%; background: #16161a;
}
.empty-face::before { left: 26px; }
.empty-face::after { right: 26px; }
.empty-mouth {
  position: absolute; left: 29px; bottom: 24px;
  width: 30px; height: 14px;
  border: 4px solid #16161a; border-top: 0;
  border-radius: 0 0 30px 30px;
}
.empty-title { font-size: 17px; font-weight: 800; }
.empty-sub {
  max-width: 260px;
  color: rgba(255,255,255,0.55);
  font-size: 13px; line-height: 1.6;
}

/* Floating Action Buttons */
/* Sheet Toolbar — action buttons inside control sheet */
.sheet-toolbar {
  display: flex;
  gap: 10px;
  padding: 10px 16px 6px;
  flex-shrink: 0;
}
.sheet-toolbar .action-btn {
  flex: 1;
  min-height: 46px;
  border-radius: 14px;
  font-size: 15px;
  font-weight: 700;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  cursor: pointer;
  transition: transform 0.15s ease, opacity 0.15s ease;
  border: none;
}
.sheet-toolbar .action-btn:active { transform: scale(0.96); }
.action-import {
  background: linear-gradient(135deg, #ff6b6b, #ffd166);
  color: #17130f;
}
.action-export {
  background: linear-gradient(135deg, #38d5a3, #6ec8ff);
  color: #06120f;
}
.sheet-toolbar .action-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

/* Bottom Sheet Control Panel */
.control-sheet {
  display: flex;
  flex-direction: column;
  gap: 0;
  background: var(--surface);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border-top: 0.5px solid var(--border);
  border-radius: 24px 24px 0 0;
  padding: 0 0 calc(env(safe-area-inset-bottom));
  max-height: 70vh;
  min-height: 0;
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.2) transparent;
  transition: max-height 0.35s cubic-bezier(0.32, 0.72, 0, 1);
  -webkit-overflow-scrolling: touch;
}
.control-sheet.collapsed {
  max-height: 38vh;
}
.control-sheet::-webkit-scrollbar { width: 6px; }
.control-sheet::-webkit-scrollbar-track { background: transparent; }
.control-sheet::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 999px; }

.sheet-handle-wrap {
  padding: 10px 0 2px;
  cursor: ns-resize;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.sheet-handle {
  width: 36px; height: 5px;
  border-radius: 999px;
  background: rgba(255,255,255,0.25);
  transition: background 0.2s ease, width 0.2s ease;
}
.sheet-handle-wrap:active .sheet-handle {
  background: rgba(255,255,255,0.45);
  width: 44px;
}
.sheet-expand-hint {
  font-size: 11px;
  color: rgba(255,255,255,0.3);
  font-weight: 600;
  transition: opacity 0.25s ease;
}
.control-sheet.collapsed .sheet-expand-hint::after { content: "上滑展开更多"; }
.control-sheet:not(.collapsed) .sheet-expand-hint::after { content: "下滑收起"; }

/* Tabs */
.sheet-tabs {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 8px 16px 4px;
  scrollbar-width: none;
}
.sheet-tabs::-webkit-scrollbar { display: none; }
.sheet-tab {
  flex-shrink: 0;
  padding: 7px 16px;
  border-radius: 8px;
  background: var(--elevated);
  border: none;
  color: var(--text-secondary);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
}
.sheet-tab.active {
  background: var(--primary);
  color: #fff;
}

/* Sheet Panels */
.sheet-panels { position: relative; }
.sheet-panel {
  display: none;
  padding: 12px 16px 20px;
  gap: 10px;
  flex-direction: column;
  animation: fadeIn 0.25s ease;
}
.sheet-panel.active { display: flex; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Panel Title */
.panel-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  font-size: 13px;
  font-weight: 800;
  color: rgba(255,255,255,0.7);
  margin-bottom: 2px;
}
.panel-actions { display: flex; align-items: center; gap: 8px; }
.panel-subtitle {
  color: var(--text-secondary);
  font-size: 12px;
  font-weight: 700;
  margin-top: 4px;
}

/* Rows & Chips */
.row {
  display: flex;
  gap: 8px;
  align-items: center;
  min-height: 0;
  flex-shrink: 0;
}
.row.wrap { flex-wrap: wrap; }
.row.scroll {
  overflow-x: auto;
  min-height: 46px;
  padding-bottom: 4px;
  scrollbar-width: none;
}
.row.scroll::-webkit-scrollbar { display: none; }

.btn, .chip, .icon-btn {
  min-height: 42px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1);
  background: var(--elevated);
  color: var(--text);
  cursor: pointer;
  transition: transform 0.15s ease, background 0.15s ease;
}
.btn:active, .chip:active, .icon-btn:active { transform: scale(0.96); }

.btn {
  flex: 1;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 0 14px;
  font-weight: 700;
  font-size: 14px;
}
.btn.good {
  background: linear-gradient(135deg, #38d5a3, #2eb398);
  color: #fff;
  border-color: transparent;
}
.btn.danger {
  background: linear-gradient(135deg, #ff453a, #ff6b6b);
  color: #fff;
  border-color: transparent;
}
.btn:disabled { opacity: 0.35; cursor: not-allowed; }

.chip {
  flex: 0 0 auto;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  padding: 0 14px;
  font-size: 13px;
  font-weight: 700;
  white-space: nowrap;
}
.chip.active {
  background: var(--primary);
  color: #fff;
  border-color: transparent;
}

.swatch {
  width: 12px; height: 12px;
  border-radius: 4px;
  background: var(--swatch);
  box-shadow: inset 0 0 0 1px rgba(0,0,0,0.16);
}

.icon-btn {
  flex: 0 0 44px;
  display: grid;
  place-items: center;
  font-size: 18px;
}

.subject-chip {
  position: relative;
  min-width: 84px;
  padding: 0 14px;
  justify-content: space-between;
}
.subject-chip .badge {
  min-width: 20px; height: 20px;
  border-radius: 999px;
  display: inline-grid;
  place-items: center;
  background: rgba(255,255,255,0.14);
  font-size: 11px;
}
.subject-chip.active .badge { background: rgba(0,0,0,0.12); }

/* Emotion Grid */
.emotion-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}
.emotion-grid .chip {
  flex-direction: column;
  padding: 10px 4px;
  min-height: 64px;
  gap: 4px;
  border-radius: 12px;
}
.emotion-grid .swatch {
  width: 22px; height: 22px;
  border-radius: 50%;
}

/* Field & Inputs */
.field {
  flex: 1;
  min-height: 76px;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  background: var(--elevated);
  color: var(--text);
  padding: 10px 12px;
  resize: none;
  outline: none;
  font-size: 15px;
}
.field:focus {
  border-color: var(--primary);
  background: rgba(255,255,255,0.08);
}

/* iOS Toggle Switch */
.ios-toggle, .ios-list-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 12px 0;
  cursor: pointer;
}
.ios-toggle input, .ios-list-item input[type="checkbox"] {
  display: none;
}
.toggle-track {
  width: 50px; height: 30px;
  border-radius: 999px;
  background: rgba(255,255,255,0.2);
  position: relative;
  transition: background 0.25s ease;
  flex-shrink: 0;
}
.toggle-knob {
  position: absolute;
  top: 2px; left: 2px;
  width: 26px; height: 26px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 2px 6px rgba(0,0,0,0.25);
  transition: transform 0.25s cubic-bezier(0.32,0.72,0,1);
}
.ios-toggle input:checked + .toggle-track,
.ios-list-item input:checked + .toggle-track {
  background: var(--primary);
}
.ios-toggle input:checked + .toggle-track .toggle-knob,
.ios-list-item input:checked + .toggle-track .toggle-knob {
  transform: translateX(20px);
}
.toggle-label {
  font-size: 15px;
  color: var(--text);
}
.ios-list-item > span:first-child {
  font-size: 15px;
  color: var(--text);
  flex: 1;
}

/* iOS Slider Group */
.ios-slider-group {
  display: grid;
  gap: 16px;
  padding: 8px 0;
}
.ios-slider-row {
  display: flex;
  align-items: center;
  gap: 12px;
}
.ios-slider-label {
  width: 72px;
  flex-shrink: 0;
  font-size: 14px;
  color: var(--text-secondary);
  font-weight: 600;
}
input[type="range"] {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 4px;
  border-radius: 999px;
  background: rgba(255,255,255,0.15);
  outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  cursor: pointer;
}
input[type="range"]::-moz-range-thumb {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: #fff;
  border: none;
  box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  cursor: pointer;
}

/* Line Emotion Panel */
.line-emotion-panel { display: grid; gap: 8px; }
.line-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 120px;
  gap: 8px;
  align-items: center;
  padding: 8px 0;
  border-bottom: 0.5px solid rgba(255,255,255,0.06);
}
.line-meta { min-width: 0; display: grid; gap: 3px; }
.line-index {
  color: var(--text-tertiary);
  font-size: 11px;
  font-weight: 800;
}
.line-preview {
  min-width: 0;
  color: rgba(255,255,255,0.82);
  font-size: 12px;
  line-height: 1.35;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.line-select {
  width: 100%;
  min-height: 36px;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  background: var(--elevated);
  color: var(--text);
  padding: 0 10px;
  outline: none;
  font-size: 13px;
}
.line-select option { background: #fff; color: #171717; }

/* Toast */
.toast {
  position: fixed;
  left: 50%;
  bottom: calc(60px + env(safe-area-inset-bottom));
  z-index: 120;
  transform: translateX(-50%) translateY(12px);
  max-width: min(88vw, 380px);
  padding: 12px 16px;
  border-radius: 12px;
  background: rgba(60,60,65,0.92);
  border: 0.5px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.92);
  font-size: 14px;
  line-height: 1.4;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease, transform 0.25s ease;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Utility */
#fileInput { display: none; }
#sourceVideo { display: none; }
.panel-resizer { display: none !important; }

/* Desktop fallback - keep centered mobile look */
@media (min-width: 820px) {
  .app {
    max-width: 414px;
    margin: 0 auto;
    position: relative;
    box-shadow: 0 0 60px rgba(0,0,0,0.6);
  }
  body { background: #0a0a0c; }
}
</style>
</head>
<body>
<main class="app">
  <div class="nav-bar">
    <div class="nav-content">
      <div class="brand"><span class="brand-mark" aria-hidden="true"></span><span>情绪拟人</span></div>
      <div class="status-pill" id="statusText">导入素材开始创作</div>
    </div>
  </div>

  <section class="stage-wrap" aria-label="预览区">
    <div class="stage" id="stage">
      <canvas id="canvas" width="720" height="1280"></canvas>
      <div class="empty-state" id="emptyState">
        <div class="empty-card">
          <div class="empty-face"><span class="empty-mouth"></span></div>
          <div class="empty-title">让静物有情绪</div>
          <div class="empty-sub">导入照片或短视频，点一下主角，就能给它加表情、手臂和气泡。</div>
        </div>
      </div>
    </div>
  </section>

  <section class="control-sheet collapsed" aria-label="控制区">
    <div class="sheet-handle-wrap" id="sheetHandleWrap">
      <div class="sheet-handle"></div>
      <span class="sheet-expand-hint"></span>
    </div>
    <div class="sheet-toolbar">
      <button class="action-btn action-import" id="pickBtn">📷 导入素材</button>
      <button class="action-btn action-export" id="exportBtn" disabled>🎬 导出视频</button>
    </div>
    <div class="sheet-tabs" id="sheetTabs">
      <button class="sheet-tab active" data-tab="subject" type="button">主体</button>
      <button class="sheet-tab" data-tab="emotion" type="button">情绪</button>
      <button class="sheet-tab" data-tab="body" type="button">肢体</button>
      <button class="sheet-tab" data-tab="text" type="button">文字</button>
      <button class="sheet-tab" data-tab="voice" type="button">声音</button>
    </div>
    <div class="sheet-panels">
      <div class="sheet-panel active" data-panel="subject">
        <div class="panel-title"><span>主体列表</span></div>
        <div class="row scroll" id="subjectList"></div>
        <div class="row">
          <button class="btn good" id="addSubjectBtn">＋ 新增</button>
          <button class="btn" id="duplicateSubjectBtn" disabled>复制</button>
          <button class="btn danger" id="deleteSubjectBtn" disabled>删除</button>
        </div>
        <div class="row">
          <button class="btn" id="detectBtn" disabled>重新识别</button>
          <button class="btn" id="centerBtn" disabled>居中</button>
        </div>
        <label class="ios-toggle">
          <input id="followToggle" type="checkbox" checked>
          <span class="toggle-track"><span class="toggle-knob"></span></span>
          <span class="toggle-label">智能追踪画面主体</span>
        </label>
      </div>
      <div class="sheet-panel" data-panel="emotion">
        <div class="panel-title"><span>情绪</span></div>
        <div class="emotion-grid" id="emotionList"></div>
        <div class="panel-title" style="margin-top:12px"><span>表情套装</span></div>
        <div class="row scroll" id="faceStyleList"></div>
        <div class="panel-subtitle">逐句情绪</div>
        <div class="line-emotion-panel" id="lineEmotionPanel"></div>
      </div>
      <div class="sheet-panel" data-panel="body">
        <div class="panel-title"><span>腿部动作</span></div>
        <div class="row scroll" id="legList"></div>
        <div class="ios-slider-group">
          <div class="ios-slider-row"><span class="ios-slider-label">身体大小</span><input id="bodySlider" type="range" min="54" max="220" value="118"></div>
          <div class="ios-slider-row"><span class="ios-slider-label">脸部大小</span><input id="faceSlider" type="range" min="60" max="180" value="100"></div>
        </div>
        <div class="ios-switches">
          <label class="ios-list-item"><span>显示身体</span><input id="bodyToggle" type="checkbox" checked><span class="toggle-track"><span class="toggle-knob"></span></span></label>
          <label class="ios-list-item"><span>显示脸部</span><input id="faceToggle" type="checkbox" checked><span class="toggle-track"><span class="toggle-knob"></span></span></label>
          <label class="ios-list-item"><span>显示腿部</span><input id="legToggle" type="checkbox"><span class="toggle-track"><span class="toggle-knob"></span></span></label>
        </div>
      </div>
      <div class="sheet-panel" data-panel="text">
        <div class="panel-title"><span>气泡文字</span></div>
        <div class="row">
          <textarea class="field" id="captionInput" rows="3" placeholder="气泡文字，每行一句"></textarea>
          <button class="icon-btn" id="shuffleBtn" title="换一句">↻</button>
        </div>
        <div class="row">
          <textarea class="field" id="personaInput" rows="2" placeholder="输入这个小人的想法、特点、口癖"></textarea>
          <button class="icon-btn" id="autoGenBtn" title="自动生成">✦</button>
        </div>
        <div class="panel-title" style="margin-top:12px"><span>气泡样式</span></div>
        <div class="row scroll" id="bubbleList"></div>
        <div class="ios-slider-group">
          <div class="ios-slider-row"><span class="ios-slider-label">文字大小</span><input id="textSlider" type="range" min="18" max="42" value="28"></div>

  function makeId() {

  function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));

  const PANEL_WIDTH_KEY = "emotion-character-panel-width";
  const PANEL_MIN_W = 430;
  const PANEL_MAX_W = 760;
  let panelResizeActive = false;
  let audioCtx = null;
  let audioMaster = null;
  let audioExportGain = null;
  let audioDestination = null;
  let audioAvailable = false;

  function panelMaxWidth() {
    return Math.max(PANEL_MIN_W, Math.min(PANEL_MAX_W, window.innerWidth - 360));
  }

  function currentPanelWidth() {
    const raw = app ? getComputedStyle(app).getPropertyValue("--panel-w") : "";
    return parseFloat(raw) || 520;
  }

  function savedPanelWidth() {
    try {
      const saved = Number(localStorage.getItem(PANEL_WIDTH_KEY));
      return Number.isFinite(saved) && saved > 0 ? saved : 520;
    } catch {
      return 520;
    }
  }

  function applyPanelWidth(width, persist = true) {
    if (!app || window.innerWidth < 820) return;
    const next = clamp(Math.round(width), PANEL_MIN_W, panelMaxWidth());
    app.style.setProperty("--panel-w", `${next}px`);
    if (persist) {
      try {
        localStorage.setItem(PANEL_WIDTH_KEY, String(next));
      } catch {}
    }
  }

  function initPanelResize() {
    applyPanelWidth(savedPanelWidth(), false);
    panelResizer.addEventListener("pointerdown", event => {
      if (window.innerWidth < 820) return;
      event.preventDefault();
      panelResizeActive = true;
      document.body.classList.add("is-resizing-panel");
      panelResizer.setPointerCapture?.(event.pointerId);
    });
    window.addEventListener("pointermove", event => {
      if (!panelResizeActive) return;
      applyPanelWidth(window.innerWidth - event.clientX);
    });
    const stopResize = () => {
      if (!panelResizeActive) return;
      panelResizeActive = false;
      document.body.classList.remove("is-resizing-panel");
    };
    window.addEventListener("pointerup", stopResize);
    window.addEventListener("pointercancel", stopResize);
    window.addEventListener("resize", () => applyPanelWidth(currentPanelWidth(), false));
  }

  function resetDialogueVoiceState(subject) {
    if (!subject) return;

  async function ensureAudio(showError = false) {
    if (!window.AudioContext && !window.webkitAudioContext) {
      if (showError) showToast("当前浏览器不支持生成声音。");
      return false;
    }

    try {
      if (!audioCtx) {
        const AudioCtor = window.AudioContext || window.webkitAudioContext;
        audioCtx = new AudioCtor();
        audioMaster = audioCtx.createGain();
        audioMaster.gain.value = 0.82;
        audioExportGain = audioCtx.createGain();
        audioExportGain.gain.value = 1;
        audioDestination = audioCtx.createMediaStreamDestination();
        audioMaster.connect(audioCtx.destination);
        audioMaster.connect(audioExportGain);
        audioExportGain.connect(audioDestination);
      }
      if (audioCtx.state === "suspended") {
        await audioCtx.resume();
      }
      audioAvailable = audioCtx.state === "running" && Boolean(audioDestination?.stream?.getAudioTracks().length);
      return audioAvailable;
    } catch (err) {
      console.error(err);
      if (showError) showToast("声音初始化失败，当前浏览器可能限制了音频。");
      return false;
    }
  }

  function voiceParam(value, time, next) {
    if (!value) return;
    value.cancelScheduledValues(time);
    value.setValueAtTime(value.value, time);
    value.linearRampToValueAtTime(next, time + 0.012);
  }

  function scheduleVoiceSyllable(voice, mod, start, duration, frequency, volume, seed) {
    const carrier = audioCtx.createOscillator();
    const carrierGain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    const tremolo = audioCtx.createOscillator();
    const tremoloGain = audioCtx.createGain();
    const tremoloDepth = audioCtx.createGain();

    carrier.type = voice.wave;
    carrier.frequency.setValueAtTime(frequency, start);
    carrier.frequency.exponentialRampToValueAtTime(Math.max(70, frequency * (1 + voice.chirp + mod.chirp)), start + duration * 0.72);

    filter.type = "bandpass";
    filter.frequency.setValueAtTime(Math.max(220, voice.formant * mod.pitch), start);
    filter.Q.value = 7;

    carrierGain.gain.setValueAtTime(0.0001, start);
    carrierGain.gain.exponentialRampToValueAtTime(Math.max(0.001, volume), start + duration * 0.18);
    carrierGain.gain.exponentialRampToValueAtTime(0.0001, start + duration);

    tremolo.type = "sine";
    tremolo.frequency.value = 10 + mod.jitter * 38 + seed * 2;
    tremoloGain.gain.value = volume * mod.jitter * 0.45;
    tremoloDepth.gain.value = 1;

    tremolo.connect(tremoloGain);
    tremoloGain.connect(carrierGain.gain);
    carrier.connect(filter);
    filter.connect(carrierGain);
    carrierGain.connect(audioMaster);

    carrier.start(start);
    tremolo.start(start);
    carrier.stop(start + duration + 0.03);
    tremolo.stop(start + duration + 0.03);

    if (voice.noise > 0) {
      const bufferSize = Math.max(1, Math.floor(audioCtx.sampleRate * duration));
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
      }
      const noise = audioCtx.createBufferSource();
      const noiseGain = audioCtx.createGain();
      const noiseFilter = audioCtx.createBiquadFilter();
      noise.buffer = buffer;
      noiseFilter.type = "highpass";
      noiseFilter.frequency.value = 900;
      noiseGain.gain.setValueAtTime(volume * voice.noise * mod.gain, start);
      noiseGain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
      noise.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(audioMaster);
      noise.start(start);
      noise.stop(start + duration + 0.02);
    }
  }

  function playGibberish(subject, dialogue, force = false) {
    if (!subject || subject.voiceEnabled === false) return;
    if (!force && subject.lastSpokenLineIndex === dialogue.index) return;
    subject.lastSpokenLineIndex = dialogue.index;
    if (!audioAvailable || !audioCtx || audioCtx.state !== "running") return;

    const voice = VOICE_TYPES[subject.voiceType] || VOICE_TYPES.minion;
    const mod = EMOTION_VOICE_MODS[dialogue.emotion] || EMOTION_VOICE_MODS.happy;
    const text = dialogue.line || "";
    const textWeight = Math.max(3, Math.min(14, Array.from(text).length));
    const syllableCount = Math.max(3, Math.min(12, Math.ceil(textWeight / 2.2)));
    const lineDuration = Math.max(0.55, Math.min(3.2, (Number(dialogue.speed) || Number(subject.lineSpeed) || 1.8) * 0.86));
    const gap = lineDuration / syllableCount;
    const syllableDuration = Math.max(0.045, Math.min(0.16, gap * 0.58 / mod.rate));
    const volume = Math.max(0, Math.min(1, Number(subject.voiceVolume ?? 0.58))) * 0.18 * mod.gain;
    const startAt = audioCtx.currentTime + 0.025;

    for (let i = 0; i < syllableCount; i++) {
      const seed = ((subject.phase || 0) + i * 1.618 + dialogue.index * 0.37) % 1;
      const pattern = voice.syllables[i % voice.syllables.length];
      const emotionJitter = 1 + (Math.sin(i * 2.4 + subject.phase) * mod.jitter);
      const pitchHop = dialogue.emotion === "surprise" ? 1 + i * 0.035 : dialogue.emotion === "sad" ? 1 - i * 0.018 : 1;
      const frequency = Math.max(80, (voice.base + voice.spread * (seed - 0.5)) * pattern * mod.pitch * emotionJitter * pitchHop);
      scheduleVoiceSyllable(voice, mod, startAt + i * gap, syllableDuration, frequency, volume, seed);
    }
  }

    const subject = selectedSubject();

  function normalizeDialogueLines(text, emotion = "happy", persona = "") {
    const raw = String(text || "")
      .replace(/\r\n/g, "\n")
      .split("\n")
      .map(line => line.trim())
      .filter(Boolean);

    if (raw.length > 0) return raw.slice(0, 12);
    return generateDialogueLines(persona, emotion);
  }

  function syncLineEmotions(subject, lines, fallbackEmotion = "happy") {
    const source = Array.isArray(subject.lineEmotions) ? subject.lineEmotions.slice() : [];
    subject.lineEmotions = lines.map((_, index) => source[index] || fallbackEmotion);
    return subject.lineEmotions;
  }

  function generateDialogueLines(personaText, emotion = "happy") {
    const persona = String(personaText || "").trim();
    const mood = emotions[emotion] || emotions.happy;
    const personaBits = persona
      ? persona.split(/[，,。.!！？?\s]+/).map(s => s.trim()).filter(Boolean).slice(0, 4)
      : [];

    const fallbackHooks = {
      happy: ["今天状态很好", "我想把快乐分给你", "你看，我是不是很亮眼"],
      surprise: ["等等，刚刚发生了什么", "我真的没有想到", "这也太突然了"],
      angry: ["我现在有点不爽", "别来惹我", "先让我缓一缓"],
      rage: ["我已经快炸了", "别再试探我的底线", "今天谁都别碰我"],
      sad: ["我有点委屈", "其实我只是想被理解", "能不能陪我一下"],
      shy: ["我先躲一下", "别一直盯着我", "我其实有点不好意思"],
      smug: ["我已经看穿了", "这波我很懂", "我知道我很厉害"],
      sleepy: ["我真的困了", "让我再眯一会儿", "电量快见底了"],
      excited: ["我已经等不及了", "走，我们冲", "这太好玩了"],
      confused: ["我有点没看懂", "这题怎么解", "我再想想"],
    };

    const traitHooks = personaBits.length ? personaBits : ["我有自己的小脾气", "我会认真观察", "我喜欢把话说清楚"];
    const moodHooks = fallbackHooks[emotion] || fallbackHooks.happy;
    const opener = persona
      ? `我这个${personaBits[0] || "小家伙"}`
      : mood.label + "状态启动";

    const pool = [
      opener,
      traitHooks[0] ? `我其实${traitHooks[0]}` : `我现在${moodHooks[0]}`,
      traitHooks[1] ? `平时我会${traitHooks[1]}` : moodHooks[1],
      traitHooks[2] ? `所以我会${traitHooks[2]}` : moodHooks[2],
      `现在的我就是${mood.label}一点`,
      `如果你理解我，我就会更开心`,
      `我想法很简单：${personaBits[0] || moodHooks[0]}`,
      `我的特点是${personaBits[1] || traitHooks[0] || moodHooks[1]}`,
    ];

    const lines = [];
    for (const item of pool) {
      if (!item || lines.includes(item)) continue;
      lines.push(item);
      if (lines.length >= 6) break;
    }
    return lines.length ? lines : [moodHooks[0], moodHooks[1], moodHooks[2]];
  }

  function getDialogueLines(subject) {
    const lines = normalizeDialogueLines(subject.dialogueText || "", subject.emotion, subject.persona);
    subject.dialogueLines = lines;
    syncLineEmotions(subject, lines, subject.emotion || "happy");
    return lines;
  }

  function getCurrentDialogueState(subject, now) {
    const lines = getDialogueLines(subject);
    if (!lines.length) return { line: "", index: 0, emotion: subject.emotion || "happy", lines };
    const speed = Math.max(0.8, Number(subject.lineSpeed) || 1.8);
    const elapsed = (now - (subject.dialogueStartedAt || state.startedAt)) / 1000;
    const index = Math.floor(elapsed / speed) % lines.length;
    const emotion = subject.lineEmotions?.[index] || subject.emotion || "happy";
    return { line: lines[index], index, emotion, lines, speed };
  }

  function setAllLineEmotions(subject, emotion) {
    const lines = getDialogueLines(subject);
    subject.lineEmotions = lines.map(() => emotion);
  }

  function setLineEmotion(subject, index, emotion) {
    const lines = getDialogueLines(subject);
    subject.lineEmotions[index] = emotion;
    if (subject.lineEmotions.length < lines.length) {
      subject.lineEmotions = lines.map((_, i) => subject.lineEmotions[i] || subject.emotion || emotion);
    }
  }

  function createSubject(overrides = {}) {
    const index = state.subjects.length;
    const baseEmotion = overrides.emotion || "happy";
    const basePhrase = pickPhrase(baseEmotion);
    return {
      id: makeId(),
      x: CANVAS_W * 0.5 + (index % 2 === 0 ? -70 : 70),
      y: CANVAS_H * 0.56 + Math.floor(index / 2) * 28,
      bodySize: 118,
      faceScale: 1,
      faceStyle: "classic",
      textScale: 28,
      emotion: baseEmotion,
      legMode: "stand",
      bubbleStyle: "speech",
      bubbleScale: 1,
      voiceType: "minion",
      voiceEnabled: true,
      voiceVolume: 0.58,
      lastSpokenLineIndex: null,
      dialogueText: basePhrase,
      dialogueLines: [basePhrase],
      lineEmotions: [baseEmotion],
      persona: "",
      lineSpeed: 1.8,
      dialogueStartedAt: performance.now(),
      autoTrack: true,
      showBody: true,
      showFace: true,
      showLegs: false,
      showText: true,
      phase: Math.random() * Math.PI * 2,
      ...overrides
    };
  }

  function addSubject(overrides = {}, select = true) {
    const subject = createSubject(overrides);
    state.subjects.push(subject);
    if (select) state.selectedId = subject.id;
    refreshControls();
    return subject;
  }

  function duplicateSelectedSubject() {
    const subject = selectedSubject();
    if (!subject) return;
    const { id, phase, ...rest } = subject;
    const copy = createSubject({
      ...rest,
      x: clamp(subject.x + 60, 80, CANVAS_W - 80),
      y: clamp(subject.y + 52, 80, CANVAS_H - 80),
      dialogueText: subject.dialogueText || pickPhrase(subject.emotion),
      dialogueLines: normalizeDialogueLines(subject.dialogueText, subject.emotion, subject.persona),
      dialogueStartedAt: performance.now()
    });
    state.subjects.push(copy);
    state.selectedId = copy.id;
    refreshControls();
    showToast("已复制一个主体");
  }

  function removeSelectedSubject() {
    if (!state.subjects.length) return;
    if (state.subjects.length === 1) {
      state.subjects[0] = createSubject({ x: CANVAS_W * 0.5, y: CANVAS_H * 0.56 });
      state.selectedId = state.subjects[0].id;
    } else {
      const id = state.selectedId;
      state.subjects = state.subjects.filter(subject => subject.id !== id);
      state.selectedId = state.subjects[0].id;
    }
    refreshControls();
  }

  function selectSubject(id) {
    state.selectedId = id;
    refreshControls();
  }

  function selectedSubjectIndex() {
    return Math.max(0, state.subjects.findIndex(subject => subject.id === state.selectedId));
  }

  function refreshControls() {
    const subject = selectedSubject();
    const enabled = Boolean(subject);
    duplicateSubjectBtn.disabled = !enabled;
    deleteSubjectBtn.disabled = !enabled;
    detectBtn.disabled = !enabled || !state.source;
    centerBtn.disabled = !enabled || !state.source;
    bodySlider.disabled = !enabled;
    faceSlider.disabled = !enabled;
    textSlider.disabled = !enabled;
    bodyToggle.disabled = !enabled;
    faceToggle.disabled = !enabled;
    legToggle.disabled = !enabled;
    textToggle.disabled = !enabled;
    captionInput.disabled = !enabled;
    personaInput.disabled = !enabled;
    speedSlider.disabled = !enabled;
    voiceVolumeSlider.disabled = !enabled;
    voiceToggle.disabled = !enabled;
    previewVoiceBtn.disabled = !enabled;
    shuffleBtn.disabled = !enabled;
    autoGenBtn.disabled = !enabled;

    buildSubjectButtons();
    buildEmotionButtons();
    buildFaceStyleButtons();
    buildLegButtons();
    buildBubbleButtons();
    buildVoiceButtons();
    buildLineEmotionPanel();

    if (!subject) {
      captionInput.value = "";
      personaInput.value = "";
      lineEmotionPanel.innerHTML = "";
      return;
    }

    captionInput.value = subject.dialogueText || "";
    personaInput.value = subject.persona || "";
    bodySlider.value = Math.round(subject.bodySize);
    faceSlider.value = Math.round(subject.faceScale * 100);
    textSlider.value = Math.round(subject.textScale);
    speedSlider.value = Number(subject.lineSpeed || 1.8).toFixed(1);
    voiceVolumeSlider.value = Math.round(clamp((subject.voiceVolume ?? 0.58) * 100, 0, 100));
    voiceToggle.checked = subject.voiceEnabled !== false;
    followToggle.checked = subject.autoTrack !== false;
    bodyToggle.checked = subject.showBody !== false;
    faceToggle.checked = subject.showFace !== false;
    legToggle.checked = subject.showLegs === true;
    textToggle.checked = subject.showText !== false;
  }

  function buildSubjectButtons() {
    subjectList.innerHTML = "";
    if (!state.subjects.length) {
      const empty = document.createElement("button");
      empty.type = "button";
      empty.className = "chip";
      empty.disabled = true;
      empty.textContent = "点击新增主体";
      subjectList.appendChild(empty);
      return;
    }

    state.subjects.forEach((subject, index) => {
      const mood = emotions[subject.emotion] || emotions.happy;
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = `chip subject-chip${subject.id === state.selectedId ? " active" : ""}`;
      btn.innerHTML = `<span>${mood.label}</span><span class="badge">${index + 1}</span>`;
      btn.addEventListener("click", () => selectSubject(subject.id));
      subjectList.appendChild(btn);
    });
  }

  function buildEmotionButtons() {
    emotionList.innerHTML = "";
    const subject = selectedSubject();
    Object.entries(emotions).forEach(([key, mood]) => {
      const btn = document.createElement("button");
      btn.className = `chip${subject && subject.emotion === key ? " active" : ""}`;
      btn.type = "button";
      btn.innerHTML = `<span class="swatch" style="--swatch:${mood.swatch}"></span>${mood.label}`;
      btn.addEventListener("click", () => {
        const target = selectedSubject();
        if (!target) return;
        target.emotion = key;
        if (!target.dialogueText || target.dialogueLines.length <= 1) {
          const lines = generateDialogueLines(target.persona, key);
          target.dialogueText = lines.join("\n");
          target.dialogueLines = lines;
        }
        setAllLineEmotions(target, key);
        resetDialogueVoiceState(target);
        target.dialogueStartedAt = performance.now();
        refreshControls();
      });
      emotionList.appendChild(btn);
    });
  }

  function buildVoiceButtons() {

      btn.addEventListener("click", async () => {
